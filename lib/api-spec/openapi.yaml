openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 2.0.0
  description: |
    # Qorix Markets — Complete API Contract

    Qorix Markets is a fintech platform for automated USDT trading. This spec is the
    authoritative contract for all frontend and mobile integrations.

    ## Authentication
    All protected endpoints require a **Bearer JWT** in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
    Tokens are issued at login/register and expire after **7 days** (configurable via
    `JWT_EXPIRY` env var). There is no separate refresh-token endpoint — the client
    should re-authenticate when a `401` is received.

    ### Mobile / Flutter Bypass
    Flutter and native mobile apps using `Authorization: Bearer <jwt>` do **not** need
    to worry about CSRF tokens or `Origin` headers. The origin guard automatically
    applies the bearer bypass for stateless clients.

    ### Device Fingerprinting
    Send `X-Device-Id` (a persistent UUID per device) on every request. This powers
    new-device alerts, withdrawal cooldowns, and session approval flows.

    ## Standardised Response Format
    ### Success
    ```json
    { "data": { ... } }          // single object
    { "data": [...], "total": 0, "page": 1, "totalPages": 1 }  // paginated list
    ```
    ### Error
    ```json
    { "error": "<machine_code>", "message": "<human string>" }
    ```
    The `error` field is always a machine-readable code (snake_case). Use it for
    conditional logic. `message` is for display.

    ## Pagination
    List endpoints that support pagination accept `?page=1&limit=20` and return:
    ```json
    { "data": [...], "total": 100, "page": 1, "totalPages": 5 }
    ```

    ## Rate Limiting
    - **Global:** 600 req/IP/min (configurable via `GLOBAL_RATE_LIMIT`)
    - **Login + 2FA:** 5 req/IP/min shared bucket across `/auth/login`,
      `/auth/2fa/login-verify`, `/auth/2fa/email-fallback/request`
    - **Signup:** 5 new accounts/IP/day

    Rate limit responses return HTTP **429** with the standard error schema.

    ## Ledger Architecture
    Every money movement (deposit, withdrawal, transfer, fee, profit) produces
    a double-entry journal entry via `lib/ledger-service.ts`. The chart of accounts is:
    - `platform:usdt_pool` — platform USDT reserve
    - `platform:fee_revenue` — collected withdrawal fees
    - `platform:referral_expense` — referral bonus outflows
    - `platform:pending_withdrawals` — funds locked while withdrawal is pending
    - `user:{id}:main` — user's main INR balance (USDT-equivalent)
    - `user:{id}:trading` — user's deployed trading capital
    - `user:{id}:profit` — user's accumulated profit
    - `user:{id}:usdt` — user's USDT spot balance

    ## Webhook-Ready Deposit Architecture
    On-chain TRON USDT deposits are handled by a self-contained pipeline:
    1. `GET /deposit/address` — returns the user's unique TRC20 deposit address
    2. The TRON monitor (`lib/tron-monitor.ts`) watches for incoming transfers
    3. On detection, a `blockchain_deposits` record is created with `status: detected`
    4. After confirmation sweep, `status` becomes `credited` and main balance is topped up
    5. The `emitDepositEvent` bus fires an SSE event to any listening client

    Webhook payloads are documented in `SSE_LIFECYCLE.md` (see flutter-docs/).

    ## Environment Separation
    | Env | API Base | Notes |
    |-----|----------|-------|
    | Dev (local) | `http://localhost:8080/api` | All security bypassed if secrets missing |
    | Dev (Replit) | `https://$REPLIT_DEV_DOMAIN/api` | Live secrets, full security |
    | Staging | `https://qorix-api-staging.fly.dev/api` | Mirror of prod config |
    | Production | `https://qorix-api.fly.dev/api` | Full hardening + Cloudflare |

  contact:
    name: Qorix Markets API Support
    email: support@qorixmarkets.com
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary

servers:
  - url: http://localhost:8080/api
    description: Local development (API Server workflow on Replit)
    x-environment: development
  - url: https://{replitDomain}/api
    description: Replit preview (replace {replitDomain} with REPLIT_DEV_DOMAIN)
    x-environment: development
    variables:
      replitDomain:
        default: your-repl.replit.dev
        description: Your Replit dev domain
  - url: https://qorix-api-staging.fly.dev/api
    description: Staging (Fly.io — mirrors production config)
    x-environment: staging
  - url: https://qorix-api.fly.dev/api
    description: Production (Fly.io — Cloudflare + full hardening)
    x-environment: production

security:
  - bearerAuth: []

tags:
  # ── v1 Mobile Layer tags ──────────────────────────────────────────────────
  - name: v1-Auth
    description: |
      **Phase 1 Mobile** — Auth endpoints.
      `POST /v1/auth/login` and `POST /v1/auth/refresh` are origin-guard exempt
      for native mobile clients (no browser Origin before token issuance).
  - name: v1-Portfolio
    description: "**Phase 1 Mobile** — Portfolio snapshot (balances + investment state)."
  - name: v1-Wallet
    description: "**Phase 1 Mobile** — Wallet balance and transaction history. Write routes return 503 in Phase 1."
  - name: v1-Markets
    description: "**Phase 1 Mobile** — Public market ticker (USDT/INR + instruments) and simulated orderbook."
  - name: v1-Bots
    description: "**Phase 1 Mobile** — Bot signal trade list and per-pair performance summary."
  - name: v1-Profile
    description: "**Phase 1 Mobile** — Extended user profile with KYC, 2FA, referral and balance summary."
  # ─────────────────────────────────────────────────────────────────────────
  - name: health
    description: Health operations
  - name: public
    description: Public endpoints (no auth required)
  - name: auth
    description: |
      Authentication — register, login, 2FA, device approval, password management.

      **Flow summary:**
      1. `POST /auth/register` → `requiresVerification: true`
      2. `POST /auth/verify-email-public` → `token` (JWT) + `user`
      3. `POST /auth/login` → either `token` (success), `requires2FA: true`, or `requiresApproval: true`
      4. If `requires2FA`: `POST /auth/2fa/login-verify` → `token`
      5. If `requiresApproval`: poll `GET /auth/login-approval?pollToken=...`
  - name: wallet
    description: |
      Wallet and balance operations. Ledger-backed — every mutation posts a double-entry journal.

      **Balance types:**
      - `mainBalance` — INR equivalent, receives deposits and INR withdrawals
      - `tradingBalance` — deployed capital pool (transfers in from main)
      - `profitBalance` — accumulated daily profits (withdraw to TRC20)
      - `usdtBalance` — USDT spot wallet (swaps via internal market)
  - name: deposits
    description: |
      TRON USDT on-chain deposit pipeline.

      **Webhook-ready architecture:** each user gets a unique TRC20 address. The TRON
      monitor detects incoming transfers within ~15s. Use `GET /deposit/history` to
      poll status, or connect to the SSE stream for real-time credit events.
  - name: withdrawals
    description: |
      Withdrawal flows — USDT/TRC20 and INR (UPI/Bank).

      Both channels require a withdrawal OTP (`POST /auth/withdrawal-otp`). Both
      enforce 24h new-account lock, 24h post-password-change lock, and 24h new-device
      cooldown. The INR channel is capped by `inrChannelMax` to enforce channel parity.
  - name: investment
    description: |
      Portfolio — auto-trading bot management. Start/stop/topup capital, adjust risk level
      and drawdown protection. Pending risk-level changes are promoted at the next trading day.
  - name: transactions
    description: Transaction history (all types — deposits, withdrawals, profits, fees, P2P, swaps)
  - name: markets
    description: |
      Internal USDT/INR market. Supports market and limit orders (buy/sell USDT).
      Rate is set by admin via system settings.
  - name: bots
    description: |
      Bot trading terminal — live price quotes (XAUUSD, EURUSD, BTCUSD, USOIL) and
      platform bot state (open/closed signal trades, user distribution share).
  - name: p2p
    description: |
      Peer-to-peer USDT trading. KYC required. Supports ads, orders, chat,
      escrow, ratings, and disputes.

      **Order SSE stream:** after creating/opening an order, call
      `POST /p2p/orders/{id}/stream-token` to get a short-lived token, then open
      `GET /p2p/orders/{id}/stream?token=<token>` as an EventSource.
  - name: notifications
    description: User notification system — in-app notifications and admin popup
  - name: referral
    description: Referral system
  - name: dashboard
    description: Dashboard summary and analytics
  - name: trading-desk
    description: Trading desk statistics and trader roster
  - name: quiz
    description: Real-time quiz giveaway (user-facing)
  - name: admin
    description: Admin panel operations
  - name: admin-quiz
    description: Admin quiz management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # PUBLIC
  /public/market-indicators:
    get:
      operationId: getMarketIndicators
      tags: [public]
      summary: Get live platform investor psychology indicators
      description: Public endpoint returning real-time platform activity stats. No auth required.
      responses:
        "200":
          description: Market indicators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketIndicators"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password-reset OTP via email
      description: |
        Sends a 6-digit OTP to the user's email if an account exists. Always
        returns a generic 200 success response to avoid leaking which emails
        are registered. Rate-limited per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Generic success (sent if account exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "400":
          description: Email missing or malformed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-reset-otp:
    post:
      operationId: verifyResetOtp
      tags: [auth]
      summary: Verify a password-reset OTP and obtain a fresh single-use code
      description: |
        Two-step reset flow step 2 of 3. Verifies the OTP from
        /auth/forgot-password, consumes it, and re-issues a fresh OTP that
        the client must present to /auth/reset-password. Lets the UI show a
        "code accepted, enter new password" screen without holding the
        original code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyResetOtpBody"
      responses:
        "200":
          description: OTP verified — `otp` field is the fresh code for the next step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResetOtpResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using a verified OTP
      description: |
        Final step of the reset flow. Requires the fresh OTP returned by
        /auth/verify-reset-otp. New password must be 8–128 chars. On
        success, `passwordChangedAt` is stamped which freezes withdrawals
        for the configured cool-down window (anti-account-takeover).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "400":
          description: Invalid OTP or password fails policy (8–128 chars)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # WALLET
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet balances
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/deposit:
    post:
      operationId: deposit
      tags: [wallet]
      summary: Deposit USDT to main balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositBody"
      responses:
        "200":
          description: Deposit processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/withdraw:
    post:
      operationId: withdraw
      tags: [wallet]
      summary: Request withdrawal from profit balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawBody"
      responses:
        "200":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/transfer:
    post:
      operationId: transferToTrading
      tags: [wallet]
      summary: Transfer between main and trading balance (bidirectional)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferBody"
      responses:
        "200":
          description: Transfer done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # TRANSACTIONS
  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: Get transaction history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"

  # INVESTMENT
  /investment:
    get:
      operationId: getInvestment
      tags: [investment]
      summary: Get active investment
      responses:
        "200":
          description: Investment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"

  /investment/start:
    post:
      operationId: startInvestment
      tags: [investment]
      summary: Start auto trading investment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartInvestmentBody"
      responses:
        "200":
          description: Investment started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /investment/stop:
    post:
      operationId: stopInvestment
      tags: [investment]
      summary: Stop auto trading
      responses:
        "200":
          description: Investment stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"

  /investment/protection:
    patch:
      operationId: updateProtection
      tags: [investment]
      summary: Update capital protection drawdown limit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProtectionBody"
      responses:
        "200":
          description: Protection settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /investment/compounding:
    patch:
      operationId: toggleCompounding
      tags: [investment]
      summary: Toggle auto compounding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompoundingBody"
      responses:
        "200":
          description: Compounding toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"

  # TRADES (simulated)
  /trades:
    get:
      operationId: getTrades
      tags: [investment]
      summary: Get recent simulated trades
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  # REFERRAL
  /referral:
    get:
      operationId: getReferral
      tags: [referral]
      summary: Get referral info
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Referral"

  /referral/referred-users:
    get:
      operationId: getReferredUsers
      tags: [referral]
      summary: Get list of referred users
      responses:
        "200":
          description: Referred users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferredUser"

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/equity-chart:
    get:
      operationId: getEquityChart
      tags: [dashboard]
      summary: Get equity history for chart
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Equity chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"

  /dashboard/performance:
    get:
      operationId: getDashboardPerformance
      tags: [dashboard]
      summary: Get performance metrics for the user
      responses:
        "200":
          description: Performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceMetrics"

  /dashboard/fund-stats:
    get:
      operationId: getDashboardFundStats
      tags: [dashboard]
      summary: Get platform fund transparency stats
      responses:
        "200":
          description: Fund stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundStats"

  /dashboard/monthly-performance:
    get:
      operationId: getMonthlyPerformance
      tags: [dashboard]
      summary: Get monthly performance history
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [3m, 6m, all]
            default: 6m
      responses:
        "200":
          description: Monthly performance history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyPerformanceList"

  # REPORTS / VERIFICATION
  /reports/generate:
    post:
      operationId: generateReport
      tags: [reports]
      summary: Generate a tamper-proof verification report for a monthly performance record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateReportBody"
      responses:
        "200":
          description: Report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateReportResponse"

  /verify/{hashId}:
    get:
      operationId: verifyReport
      tags: [reports]
      summary: Publicly verify a monthly performance report by hash ID
      parameters:
        - name: hashId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verified report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyReportResponse"
        "404":
          description: Report not found

  # NOTIFICATIONS
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get user notifications
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: unread
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete a notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ADMIN
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin overview stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/profit:
    post:
      operationId: setDailyProfit
      tags: [admin]
      summary: Set daily profit percentage and distribute to all active investors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetDailyProfitBody"
      responses:
        "200":
          description: Profit set and distributed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/slots:
    post:
      operationId: setInvestorSlots
      tags: [admin]
      summary: Set the maximum number of active investor slots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetInvestorSlotsBody"
      responses:
        "200":
          description: Slots updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestorSlots"

  /admin/profit/history:
    get:
      operationId: getProfitHistory
      tags: [admin]
      summary: Get daily profit distribution history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
