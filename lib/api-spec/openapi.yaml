  /v1/wallet/history:
    get:
      tags: [v1-Wallet]
      operationId: v1WalletHistory
      summary: Transaction history (paginated)
      description: |
        Returns the calling user's transaction ledger ordered by `createdAt`
        descending. Supports optional `type` filter.

        **Transaction types:**
        | type | description |
        |---|---|
        | `deposit` | USDT TRC20 deposit credited to main balance |
        | `withdrawal` | USDT TRC20 withdrawal from main balance |
        | `inr_withdrawal` | INR bank/UPI withdrawal |
        | `transfer` | Internal transfer between sub-wallets |
        | `profit` | Daily bot profit credit |
        | `fee` | Withdrawal fee charged |
        | `referral_bonus` | Sponsor commission credit |
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: type
          schema:
            type: string
            enum: [deposit, withdrawal, inr_withdrawal, transfer, profit, fee, referral_bonus]
          description: Filter by transaction type
      responses:
        "200":
          description: Paginated transaction list
          content:
            application/json:
              example:
                success: true
                data:
                  - id: 2337
                    type: "referral_bonus"
                    amount: 3.331953
                    status: "completed"
                    description: "Referral commission: 10% of partner's daily profit"
                    walletAddress: null
