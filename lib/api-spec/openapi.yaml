components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued at login/register. Expires after `JWT_EXPIRY` (default 7 days).
        On expiry (401 response), re-authenticate via `POST /auth/login`.

        **Mobile clients:** include `X-Device-Id: <persistent-uuid>` on every request.

  responses:
    Unauthorized:
      description: Not authenticated or token expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "unauthorized"
            message: "No token provided or token expired"
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit window resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "too_many_requests"
            message: "Rate limit exceeded. Try again in 60 seconds."

  schemas:
    # ── v1 Mobile Layer schemas ──────────────────────────────────────────────
    V1Meta:
      type: object
      description: Standard v1 response metadata attached to every response.
      properties:
        version:
          type: string
          example: "v1"
        requestId:
          type: string
          example: "8ca07a202476a74f"
        timestamp:
          type: string
          format: date-time
      required: [version, requestId, timestamp]

    V1UserMin:
      type: object
      description: Minimal user object returned in auth responses.
      properties:
        id: { type: integer, example: 117 }
        email: { type: string, format: email, example: "pravesh@example.com" }
        fullName: { type: string, example: "Pravesh Kumar" }
        kycStatus: { type: string, enum: [not_submitted, pending, approved, rejected] }
        emailVerified: { type: boolean }
        isAdmin: { type: boolean }
        isFrozen: { type: boolean }
        isDisabled: { type: boolean }
        referralCode: { type: string, example: "QXC5168F43" }
        points: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, email, fullName, kycStatus, emailVerified, isAdmin, isFrozen, isDisabled, referralCode, points, createdAt]

    V1LoginResponse:
      type: object
      description: Successful login envelope.
      properties:
        success:
          type: boolean
          example: true
        data:
          oneOf:
            - description: Token issued successfully
              type: object
              properties:
                token:
                  type: string
                  description: "7-day Bearer JWT. Pass as: Authorization: Bearer <token>"
                tokenType:
                  type: string
                  example: "Bearer"
                expiresIn:
                  type: integer
                  example: 604800
                  description: Seconds until expiry (7 days = 604800)
                user:
                  $ref: "#/components/schemas/V1UserMin"
            - description: 2FA required — token not yet issued
              type: object
              properties:
                requires2FA:
                  type: boolean
                  example: true
                message:
                  type: string
        meta:
          $ref: "#/components/schemas/V1Meta"

    V1ErrorResponse:
      type: object
      description: Standard v1 error envelope.
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable snake_case error code
              example: "invalid_credentials"
            message:
              type: string
              description: Human-readable description
              example: "Email or password is incorrect"
          required: [code, message]
        meta:
          $ref: "#/components/schemas/V1Meta"
      required: [success, error, meta]

    V1Pagination:
      type: object
      description: Pagination block returned on list responses.
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 125 }
        totalPages: { type: integer, example: 7 }
      required: [page, limit, total, totalPages]
    # ─────────────────────────────────────────────────────────────────────────

    DemoStatus:
      type: object
      properties:
        resetAvailable: { type: boolean }
        reason: { type: string, nullable: true }
        demoEmail: { type: string }
        env: { type: string }
      required: [resetAvailable, demoEmail, env]

    DemoResetRequest:
      type: object
      properties:
        confirm:
          type: string
          description: Optional safety gate. If provided must equal "RESET_DEMO"

    DemoResetSeededWallets:
      type: object
      properties:
        inr: { type: number }
        usdt: { type: number }
        trading: { type: number }
        profit: { type: number }
      required: [inr, usdt, trading, profit]

    DemoResetSeededInvestment:
      type: object
      properties:
        amount: { type: number }
        riskLevel: { type: string }
        isActive: { type: boolean }
        totalProfit: { type: number }
      required: [amount, riskLevel, isActive, totalProfit]

    DemoResetSeededP2P:
      type: object
      properties:
        ads: { type: integer }
        completedOrders: { type: integer }
        pendingOrders: { type: integer }
        chatMessages: { type: integer }
        ratings: { type: integer }
      required: [ads, completedOrders, pendingOrders, chatMessages, ratings]

    DemoResetSeededNotifications:
      type: object
      properties:
        total: { type: integer }
        unread: { type: integer }
      required: [total, unread]

    DemoResetSeeded:
      type: object
      properties:
        wallets: { $ref: "#/components/schemas/DemoResetSeededWallets" }
        investment: { $ref: "#/components/schemas/DemoResetSeededInvestment" }
        trades: { type: integer }
        transactions: { type: integer }
        notifications: { $ref: "#/components/schemas/DemoResetSeededNotifications" }
        equityHistory: { type: integer }
        p2p: { $ref: "#/components/schemas/DemoResetSeededP2P" }
      required: [wallets, investment, trades, transactions, notifications, equityHistory, p2p]

    DemoResetResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        demoEmail: { type: string }
        demoPassword: { type: string }
        resetAt: { type: string, format: date-time }
        durationMs: { type: integer }
        seeded: { $ref: "#/components/schemas/DemoResetSeeded" }
      required: [success, message, demoEmail, demoPassword, resetAt, durationMs, seeded]


    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    NotificationItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          description: "daily_profit | monthly_payout | drawdown_alert | deposit | withdrawal | system"
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - userId
        - type
        - title
        - message
        - isRead
        - createdAt

    NotificationList:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/NotificationItem"
        unreadCount:
          type: integer
      required:
        - notifications
        - unreadCount

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MarketIndicators:
      type: object
      properties:
        activeInvestors:
          type: integer
          description: Number of users with an active investment
        usersEarningNow:
          type: integer
          description: Number of users currently receiving returns
        withdrawals24h:
          type: integer
          description: Number of withdrawals processed in the last 24 hours
        avgMonthlyReturn:
          type: number
          description: Estimated average monthly return based on last 30 days of profit runs
      required:
        - activeInvestors
        - usersEarningNow
        - withdrawals24h
        - avgMonthlyReturn

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # AUTH
    RegisterBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        fullName:
          type: string
        referralCode:
          type: ["string", "null"]
      required:
        - email
        - password
        - fullName

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    ForgotPasswordBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    VerifyResetOtpBody:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          description: 6-digit OTP from the forgot-password email
      required:
        - email
        - otp

    VerifyResetOtpResponse:
      type: object
      properties:
        success:
          type: boolean
        otp:
          type: string
          description: |
            Freshly re-issued single-use OTP. The client MUST forward this
            value to /auth/reset-password — the original OTP from the email
            has been consumed. Valid for the same 10-minute window.
      required:
        - success
        - otp

    ResetPasswordBody:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          description: Fresh OTP from /auth/verify-reset-otp response
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
      required:
        - email
        - otp
        - newPassword

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    AuthResponse:
      type: object
      properties:
        token:
