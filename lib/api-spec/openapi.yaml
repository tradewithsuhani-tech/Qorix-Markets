      required: [title, scheduledStartAt, prizePool]

    AdminUpdateQuizRequest:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        scheduledStartAt: { type: string }
        prizePool: { type: string }
        prizeCurrency: { type: string }
        prizeSplit:
          type: array
          items: { type: number }
        questionTimeMs: { type: integer }
        entryRules:
          type: object
          properties:
            requireKyc: { type: boolean }
        notifyEnabled: { type: boolean }

    AdminForceStartResponse:
      type: object
      properties:
        success: { type: boolean }
        startedHere: { type: boolean }
      required: [success, startedHere]

    AdminQuizQuestion:
      type: object
      properties:
        id: { type: integer }
        quizId: { type: integer }
        position: { type: integer }
        prompt: { type: string }
        options:
          type: array
          items: { type: string }
        correctIndex: { type: integer }
        explanation: { type: string }
        source: { type: string, enum: [manual, ai] }
      required: [id, quizId, position, prompt, options, correctIndex, source]

    AdminQuizQuestionListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminQuizQuestion" }
      required: [data]

    AdminQuizQuestionPayload:
      type: object
      properties:
        prompt: { type: string }
        options:
          type: array
          items: { type: string }
        correctIndex: { type: integer, minimum: 0, maximum: 3 }
        explanation: { type: string }
        source: { type: string, enum: [manual, ai] }
      required: [prompt, options, correctIndex]

    AdminAddQuizQuestionsRequest:
      type: object
      properties:
        question:
          $ref: "#/components/schemas/AdminQuizQuestionPayload"
        questions:
          type: array
          items: { $ref: "#/components/schemas/AdminQuizQuestionPayload" }
        replace:
          type: boolean

    AdminAddQuizQuestionsResponse:
      oneOf:
        - $ref: "#/components/schemas/AdminQuizQuestion"
        - $ref: "#/components/schemas/AdminQuizQuestionListResponse"

    AdminReorderQuizQuestionsRequest:
      type: object
      properties:
        order:
          type: array
          items: { type: integer }
      required: [order]

    AdminGenerateQuizAiRequest:
      type: object
      properties:
        topicHint:
          type: string

    AdminGenerateQuizAiDraft:
      type: object
      properties:
        prompt: { type: string }
        options:
          type: array
          items: { type: string }
        correctIndex: { type: integer }
        explanation: { type: string }
      required: [prompt, options, correctIndex, explanation]

    AdminGenerateQuizAiResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AdminGenerateQuizAiDraft" }
      required: [data]

    AdminQuizMonitorLeaderboardRow:
      type: object
      properties:
        userId: { type: integer }
        score: { type: integer }
        rank: { type: integer }
        displayName: { type: string }
      required: [userId, score, rank, displayName]

    AdminQuizMonitorRunner:
      type: object
      properties:
        currentQuestionIndex: { type: integer, nullable: true }
        currentQuestionId: { type: integer, nullable: true }
        questionStartedAtMs: { type: integer, nullable: true }
        questionDeadlineMs: { type: integer, nullable: true }
        windowMs: { type: integer }
        phase: { type: string }

    AdminQuizMonitorResponse:
      type: object
      properties:
        quiz: { $ref: "#/components/schemas/AdminQuiz" }
        runner:
          $ref: "#/components/schemas/AdminQuizMonitorRunner"
        leaderboard:
          type: array
          items: { $ref: "#/components/schemas/AdminQuizMonitorLeaderboardRow" }
        participants: { type: integer }
      required: [quiz, leaderboard, participants]

    AdminQuizWinner:
      type: object
      properties:
        id: { type: integer }
        rank: { type: integer }
        finalScore: { type: integer }
        prizeAmount: { type: string }
        prizeCurrency: { type: string }
        paidStatus: { type: string, enum: [pending, paid] }
        paidAt:
          type: string
          nullable: true
        paidNote:
          type: string
          nullable: true
        paidTxnId:
          type: integer
          nullable: true
        paidByAdminId:
          type: integer
          nullable: true
        userId: { type: integer }
        userEmail:
          type: string
          nullable: true
        userName:
          type: string
          nullable: true
        userPhone:
          type: string
          nullable: true
      required: [id, rank, finalScore, prizeAmount, prizeCurrency, paidStatus, userId]

    AdminQuizResultsResponse:
      type: object
      properties:
        quiz: { $ref: "#/components/schemas/AdminQuiz" }
        participants: { type: integer }
        winners:
          type: array
          items: { $ref: "#/components/schemas/AdminQuizWinner" }
      required: [quiz, participants, winners]

    AdminMarkQuizWinnerPaidRequest:
      type: object
      properties:
        note: { type: string }

    AdminQuizWinnerPaidResult:
      type: object
      properties:
        id: { type: integer }
        paidStatus: { type: string }
        paidAt:
          type: string
          nullable: true
        paidNote:
          type: string
          nullable: true
      required: [id, paidStatus]

    # ── COMMON RESPONSE ENVELOPE ──────────────────────────────────────────
    SuccessMessage:
      type: object
      properties:
        message: { type: string }
      required: [message]

    PaginatedMeta:
      type: object
      description: Pagination metadata included in all paginated list responses
      properties:
        total: { type: integer, description: Total matching records }
        page: { type: integer, description: Current page (1-indexed) }
        totalPages: { type: integer }
      required: [total, page, totalPages]

    # ── TRADE LIST (paginated) ────────────────────────────────────────────
    TradeList:
      type: object
      allOf:
        - $ref: "#/components/schemas/PaginatedMeta"
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
      required: [data]

    # ── WITHDRAWAL SCHEMAS ────────────────────────────────────────────────
    WithdrawalLimits:
      type: object
      description: Per-channel withdrawal caps based on deposit channel parity
      properties:
        usdtWithdrawableMax:
          type: number
          description: Max USDT withdrawable via TRC20 (equals total USDT deposited)
        usdtWithdrawnSoFar:
          type: number
          description: Total USDT already withdrawn via TRC20
        usdtRemainingLimit:
          type: number
        inrWithdrawableMax:
          type: number
          description: Max INR withdrawable (equals total INR deposited equivalent)
        inrWithdrawnSoFar:
          type: number
        inrRemainingLimit:
          type: number
      required:
        - usdtWithdrawableMax
        - usdtWithdrawnSoFar
        - usdtRemainingLimit
        - inrWithdrawableMax
        - inrWithdrawnSoFar
        - inrRemainingLimit

    InrWithdrawalRequest:
      type: object
      required: [amountInr, paymentMethodType, otp]
      properties:
        amountInr:
          type: number
          minimum: 100
          description: Amount in INR (minimum ₹100)
        paymentMethodType:
          type: string
          enum: [upi, bank]
          description: Payment channel
        upiId:
          type: string
          description: Required when paymentMethodType = upi
          example: "user@upi"
        bankAccountNumber:
          type: string
          description: Required when paymentMethodType = bank
        bankIfsc:
          type: string
          description: Required when paymentMethodType = bank, 11-char IFSC
          example: "HDFC0001234"
        bankAccountName:
          type: string
          description: Required when paymentMethodType = bank
        otp:
          type: string
          description: 6-digit OTP obtained from POST /auth/withdrawal-otp
          example: "482917"

    InrWithdrawal:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        amountInr:
          type: string
          description: Decimal string amount in INR
        amountUsdt:
          type: string
          description: USDT equivalent deducted from main balance
        status:
          type: string
          enum: [pending, approved, rejected, processing]
        paymentMethodType:
          type: string
          enum: [upi, bank]
        upiId:
          type: string
          nullable: true
        bankAccountNumber:
          type: string
          nullable: true
        bankIfsc:
          type: string
          nullable: true
        bankAccountName:
          type: string
          nullable: true
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - amountInr
        - amountUsdt
        - status
        - paymentMethodType
        - createdAt
        - updatedAt

    WithdrawalError:
      type: object
      description: |
        Extended error response for withdrawal failures.
        Machine-readable `error` codes:
        - `insufficient_main_balance` — not enough in main balance
        - `channel_cap_exceeded` — INR withdrawal cap reached
        - `invalid_otp` — wrong or expired OTP
        - `withdrawal_otp_required` — missing OTP field
        - `kyc_required` — KYC not approved
        - `account_restricted` — account frozen by admin
        - `withdrawal_locked_new_account` — account < 24h old
        - `withdrawal_locked_password_change` — password changed < 24h ago
        - `withdrawal_locked_new_device` — device first seen < 24h ago
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable description
        remainingLimit:
          type: number
          nullable: true
          description: Present for cap_exceeded errors — shows remaining allowed amount
      required: [error, message]

    # ── MARKETS — USDT/INR internal market ───────────────────────────────
    UsdtMarketRate:
      type: object
      properties:
        rate:
          type: number
          description: Admin-set base USDT/INR rate (e.g. 86.5)
        lastPrice:
          type: number
          description: Rate + small random jitter for tick simulation
        change24h:
          type: number
          description: Simulated 24h price change percentage
        volume24h:
          type: number
          description: Simulated 24h volume in USDT
        high24h:
          type: number
        low24h:
          type: number
        timestamp:
          type: string
          format: date-time
      required: [rate, lastPrice, timestamp]

    UsdtSwapRequest:
      type: object
      required: [side, amount, orderType]
      properties:
        side:
          type: string
          enum: [buy, sell]
          description: "buy = INR→USDT, sell = USDT→INR"
        amount:
          type: number
          minimum: 1
          description: Amount in USDT (minimum 1 USDT)
        orderType:
          type: string
          enum: [market, limit]
        limitPrice:
          type: number
          description: Required for limit orders — the target INR/USDT rate

    UsdtSwapResponse:
      type: object
      properties:
        success: { type: boolean }
        orderType:
          type: string
          enum: [market, limit]
        side:
          type: string
          enum: [buy, sell]
        amount:
          type: number
          description: USDT amount
        executedRate:
          type: number
          nullable: true
          description: Actual rate used (null for pending limit orders)
        inrAmount:
          type: number
          nullable: true
          description: INR credited/debited
        status:
          type: string
          enum: [executed, pending]
        orderId:
          type: integer
          nullable: true
          description: Order ID for limit orders (use to cancel via DELETE /usdt-market/open-orders/{id})
        newUsdtBalance:
          type: number
          nullable: true
        newMainBalance:
          type: number
          nullable: true
      required: [success, orderType, side, amount, status]

    UsdtLimitOrder:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        side:
          type: string
          enum: [buy, sell]
        amount:
          type: number
          description: USDT amount
        limitPrice:
          type: number
          description: Target INR/USDT rate
        lockedInr:
          type: number
          nullable: true
          description: INR locked for buy limit orders
        lockedUsdt:
          type: number
          nullable: true
          description: USDT locked for sell limit orders
        status:
          type: string
          enum: [pending, executed, cancelled]
        createdAt:
          type: string
          format: date-time
      required: [id, userId, side, amount, limitPrice, status, createdAt]

    UsdtMarketHistoryItem:
      type: object
      properties:
        id: { type: integer }
        side:
          type: string
          enum: [buy, sell]
        orderType:
          type: string
          enum: [market, limit]
        amount: { type: number }
        executedRate: { type: number }
        inrAmount: { type: number }
        createdAt:
          type: string
          format: date-time
      required: [id, side, orderType, amount, executedRate, inrAmount, createdAt]

    # ── BOTS — Bot Trading Terminal ───────────────────────────────────────
    BotQuote:
      type: object
      properties:
        symbol:
          type: string
          example: "XAUUSD"
        bid: { type: number }
        ask: { type: number }
        mid: { type: number }
        change: { type: number, description: Price change vs previous close }
        changePct: { type: number, description: Percent change }
        timestamp:
          type: string
          format: date-time
      required: [symbol, bid, ask, mid, timestamp]

    BotQuotesResponse:
      type: object
      properties:
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/BotQuote"
        cachedAt:
          type: string
          format: date-time
      required: [quotes]

    BotSignalTrade:
      type: object
      description: A platform-level signal trade opened by admin, shared across all active investors
      properties:
        id: { type: integer }
        symbol:
          type: string
          example: "XAUUSD"
        direction:
          type: string
          enum: [long, short]
        entryPrice: { type: number }
        currentPrice: { type: number }
        pnlPct:
          type: number
          description: Live PnL percentage
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [open, closed]
        profitDistributedPct:
          type: number
          nullable: true
          description: Final profit distributed to users on close
      required: [id, symbol, direction, entryPrice, status, openedAt]

    BotDistributionShare:
      type: object
      description: The calling user's share of the latest signal trade profit
      properties:
        userId: { type: integer }
        shareUsdt:
          type: number
          description: USDT credited to user's trading balance from latest signal trade
        signalTradeId: { type: integer }
        distributedAt:
          type: string
          format: date-time
      required: [userId, shareUsdt, signalTradeId, distributedAt]

    BotStateResponse:
      type: object
      properties:
        forexMarketOpen: { type: boolean }
        cryptoMarketOpen: { type: boolean }
        botPlan:
          type: object
          nullable: true
          properties:
            totalSlots: { type: integer }
            executedToday: { type: integer }
            pendingSlots: { type: integer }
            nextSlotEtaMs:
              type: integer
              nullable: true
              description: Milliseconds until next slot execution
          required: [totalSlots, executedToday, pendingSlots]
        openSignalTrades:
          type: array
          items:
            $ref: "#/components/schemas/BotSignalTrade"
        closedTodaySignalTrades:
          type: array
          items:
            $ref: "#/components/schemas/BotSignalTrade"
        myDistribution:
          $ref: "#/components/schemas/BotDistributionShare"
          nullable: true
      required: [forexMarketOpen, cryptoMarketOpen, openSignalTrades, closedTodaySignalTrades]

    # ── P2P — Peer-to-Peer USDT Trading ──────────────────────────────────
    P2pWallet:
      type: object
      description: User's P2P-specific wallet (separate ledger from main wallet)
      properties:
        usdtBalance:
          type: number
          description: Available USDT for P2P trading
        usdtEscrow:
          type: number
          description: USDT locked in active P2P escrow orders
        inrBalance:
          type: number
          description: INR received from P2P sales
      required: [usdtBalance, usdtEscrow, inrBalance]

    P2pAd:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        type:
          type: string
          enum: [BUY, SELL]
          description: "BUY = ad owner wants to buy USDT; SELL = ad owner wants to sell USDT"
        minAmount:
          type: number
          description: Minimum order amount in USDT
        maxAmount:
          type: number
          description: Maximum order amount in USDT
        rate:
          type: number
          description: INR per USDT offered by the ad owner
        paymentMethods:
          type: array
          items:
            type: string
            enum: [upi, bank, imps]
          description: Accepted payment channels
        remarks:
          type: string
          nullable: true
          description: Optional instructions from the ad owner
        isActive: { type: boolean }
        completedOrdersCount: { type: integer }
        averageRating:
          type: number
          nullable: true
          minimum: 1
          maximum: 5
        createdAt:
          type: string
          format: date-time
        ownerDisplayName:
          type: string
          description: Obfuscated display name of the ad owner
      required: [id, userId, type, minAmount, maxAmount, rate, paymentMethods, isActive, createdAt]

    P2pAdCreateRequest:
      type: object
      required: [type, minAmount, maxAmount, rate, paymentMethods]
      properties:
        type:
          type: string
          enum: [BUY, SELL]
        minAmount:
          type: number
          minimum: 1
        maxAmount:
          type: number
          minimum: 1
        rate:
          type: number
          minimum: 1
          description: INR per USDT you are willing to buy/sell at
        paymentMethods:
          type: array
          items:
            type: string
            enum: [upi, bank, imps]
          minItems: 1
        remarks:
          type: string
          maxLength: 500

    P2pAdUpdateRequest:
      type: object
      properties:
        minAmount: { type: number, minimum: 1 }
        maxAmount: { type: number, minimum: 1 }
        rate: { type: number, minimum: 1 }
        paymentMethods:
          type: array
          items:
            type: string
            enum: [upi, bank, imps]
        remarks: { type: string, maxLength: 500 }
        isActive: { type: boolean }

    P2pOrder:
      type: object
      properties:
        id: { type: integer }
        adId: { type: integer }
        buyerId: { type: integer }
        sellerId: { type: integer }
        type:
          type: string
          enum: [BUY, SELL]
          description: Type inherited from the ad
        amountUsdt:
          type: number
          description: USDT amount being traded
        amountInr:
          type: number
          description: INR amount to be paid (amountUsdt × rate)
        rate:
          type: number
          description: Locked-in exchange rate at order creation
        status:
          type: string
          enum: [pending, paid, completed, cancelled, disputed]
          description: |
            - `pending` — buyer has not yet marked payment
            - `paid` — buyer has marked payment, waiting for seller release
            - `completed` — seller released escrow, USDT credited to buyer
            - `cancelled` — timed out or manually cancelled, escrow refunded
            - `disputed` — admin intervention required
        paymentDeadlineAt:
          type: string
          format: date-time
          nullable: true
          description: When the order auto-cancels if not marked paid (15 min from creation)
        paymentMethod:
          type: string
          enum: [upi, bank, imps]
        paymentDetails:
          type: object
          description: Seller's payment details (shown to buyer after order created)
          nullable: true
        disputeReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - adId
        - buyerId
        - sellerId
        - type
        - amountUsdt
        - amountInr
        - rate
        - status
        - createdAt
        - updatedAt

    P2pOrderCreateRequest:
      type: object
      required: [adId, amountUsdt, paymentMethod]
      properties:
        adId:
          type: integer
          description: The P2P ad to place an order against
        amountUsdt:
          type: number
          minimum: 1
          description: Must be between ad's minAmount and maxAmount
        paymentMethod:
          type: string
          enum: [upi, bank, imps]
          description: Must be one of the ad's paymentMethods

    P2pChatMessage:
      type: object
      properties:
        id: { type: integer }
        orderId: { type: integer }
        senderId: { type: integer }
        senderRole:
          type: string
          enum: [buyer, seller, admin]
        message: { type: string }
        messageType:
          type: string
          enum: [text, image, system]
          default: text
        createdAt:
          type: string
          format: date-time
      required: [id, orderId, senderId, senderRole, message, messageType, createdAt]

    P2pDispute:
      type: object
      properties:
        id: { type: integer }
        orderId: { type: integer }
        raisedById: { type: integer }
        reason: { type: string }
        status:
          type: string
          enum: [open, resolved, closed]
        resolvedNote:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, orderId, raisedById, reason, status, createdAt]

    P2pPaymentMethod:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        type:
          type: string
          enum: [upi, bank]
        isDefault: { type: boolean }
        upiId:
          type: string
          nullable: true
        bankAccountNumber:
          type: string
          nullable: true
        bankIfsc:
          type: string
          nullable: true
        bankAccountName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, userId, type, isDefault, createdAt]

    P2pPaymentMethodRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [upi, bank]
        upiId:
          type: string
          description: Required when type = upi
        bankAccountNumber:
          type: string
          description: Required when type = bank
        bankIfsc:
          type: string
          description: Required when type = bank, 11-char IFSC
        bankAccountName:
          type: string
          description: Required when type = bank
        isDefault:
          type: boolean
          default: false

    P2pMerchantProfile:
      type: object
      properties:
        userId: { type: integer }
        displayName: { type: string }
        completedOrders: { type: integer }
        cancelledOrders: { type: integer }
        completionRate:
          type: number
          description: Percent of orders completed (0–100)
        averageReleaseTimeSec:
          type: integer
          nullable: true
          description: Median escrow release time in seconds
        positiveRatingsPct:
          type: number
          description: Percent of ratings that are 4+ stars
        averageRating:
          type: number
          nullable: true
          minimum: 1
          maximum: 5
        totalRatings: { type: integer }
        activeAds: { type: integer }
        memberSince:
          type: string
          format: date-time
      required:
        - userId
        - displayName
        - completedOrders
        - cancelledOrders
        - completionRate
        - positiveRatingsPct
        - totalRatings
        - activeAds
        - memberSince
