  # ══════════════════════════════════════════════════════════════════════════
  # WITHDRAWALS — USDT (TRC20) — see also /wallet/withdraw above
  # ══════════════════════════════════════════════════════════════════════════
  /auth/withdrawal-otp:
    post:
      operationId: requestWithdrawalOtp
      tags: [withdrawals]
      summary: Request a one-time OTP to authorise a withdrawal
      description: |
        Sends a 6-digit OTP to the user's email. The OTP must be included
        in the withdrawal request body (`otp` field) for both USDT and INR
        withdrawal endpoints. The OTP is single-use and expires in 10 minutes.

        **Purpose:** `withdrawal_confirm`

        This is step 1 of the 2-step withdrawal flow:
        1. `POST /auth/withdrawal-otp` → receive OTP via email
        2. `POST /wallet/withdraw` or `POST /inr-withdrawals` with `otp` in body
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OTP sent (generic — does not reveal whether email was delivered)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /withdrawal-limits:
    get:
      operationId: getWithdrawalLimits
      tags: [withdrawals]
      summary: Get withdrawal caps for the current user
      description: |
        Returns the channel-parity caps that determine how much a user can
        withdraw via each channel (USDT TRC20 vs INR UPI/Bank).

        **Channel parity rule:** USDT deposited must exit via USDT; INR deposited
        must exit via INR. Caps prevent cross-channel drainage.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Withdrawal limits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalLimits"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ══════════════════════════════════════════════════════════════════════════
  # WITHDRAWALS — INR (UPI / Bank Transfer)
  # ══════════════════════════════════════════════════════════════════════════
  /inr-withdrawals:
    post:
      operationId: createInrWithdrawal
      tags: [withdrawals]
      summary: Submit an INR withdrawal (UPI or bank transfer)
      description: |
        Debits the user's **main balance** (USDT-equivalent) and creates a
        pending INR withdrawal request for admin payout.

        **Prerequisites (all enforced server-side):**
        - KYC status = `approved`
        - Account age ≥ 24h
        - No password change in last 24h
        - Device first seen ≥ 24h ago
        - Valid email OTP (request via `POST /auth/withdrawal-otp`)
        - INR channel cap not exceeded (`GET /withdrawal-limits`)

        **Payout flow:**
        1. User submits → status = `pending`, funds debited from main balance
        2. Admin reviews in admin panel → approves or rejects
        3. On approval, merchant is credited; user notified via email + notification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InrWithdrawalRequest"
      responses:
        "200":
          description: INR withdrawal submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawal:
                    $ref: "#/components/schemas/InrWithdrawal"
        "400":
          description: |
            Validation error or cap exceeded.
            Error codes: `insufficient_main_balance`, `channel_cap_exceeded`,
            `invalid_otp`, `withdrawal_otp_required`, `amountInr must be at least ₹100`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalError"
        "403":
          description: |
            Account restriction or withdrawal lock.
            Error codes: `account_restricted`, `kyc_required`,
            `withdrawal_locked_new_account`, `withdrawal_locked_password_change`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /inr-withdrawals/mine:
    get:
      operationId: getMyInrWithdrawals
      tags: [withdrawals]
      summary: Get my INR withdrawal history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: INR withdrawal history
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawals:
                    type: array
                    items:
                      $ref: "#/components/schemas/InrWithdrawal"

  # ══════════════════════════════════════════════════════════════════════════
  # INVESTMENT — additional endpoints (risk-level, topup)
  # ══════════════════════════════════════════════════════════════════════════
  /investment/risk-level:
    patch:
      operationId: changeRiskLevel
      tags: [investment]
      summary: Queue a risk-level change (effective next trading day)
      description: |
        Sets a **pending** risk-level change. The change is promoted before the
        next day's profit run so today's profit still accrues at the current rate.

        **Risk levels and drawdown limits:**
        - `low` → 3% drawdown protection
        - `medium` → 5% drawdown protection
        - `high` → 10% drawdown protection

        If the requested level equals the current level (no pending change), returns
        the current investment unchanged. Idempotent on duplicate submissions.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [riskLevel]
              properties:
                riskLevel:
                  type: string
                  enum: [low, medium, high]
      responses:
        "200":
          description: Risk-level change queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
        "400":
          description: No active investment or invalid risk level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: cancelPendingRiskLevel
      tags: [investment]
      summary: Cancel a pending risk-level change
      description: |
        Removes the queued pending risk-level change before it is promoted.
        Only works while the investment is **active**. Returns 409 if investment
        is inactive. Returns the unchanged investment if there is no pending change.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending change cancelled (or was already absent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
        "409":
          description: Investment is not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /investment/topup:
    post:
      operationId: topupInvestment
      tags: [investment]
      summary: Add capital to an active investment (NAV-pending)
      description: |
        Queues additional capital from the trading balance into the active
        investment. The amount is stored as `navPendingAdd` and merged before
        the **next** day's profit run (today's NAV snapshot is preserved).

        Available = `tradingBalance - amount - existingPending`
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  description: Additional USDT to deploy (must not exceed available trading balance)
      responses:
        "200":
          description: Top-up queued (earns from next trading day)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
        "400":
          description: No active investment or insufficient available trading balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /investment/trades:
    get:
      operationId: getInvestmentTrades
      tags: [investment]
      summary: Get paginated bot trade history
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 100 }
      responses:
        "200":
          description: Paginated trade history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ══════════════════════════════════════════════════════════════════════════
  # MARKETS — USDT/INR internal market
  # ══════════════════════════════════════════════════════════════════════════
  /usdt-market/rate:
    get:
      operationId: getUsdtMarketRate
      tags: [markets]
      summary: Get current USDT/INR exchange rate
      description: |
        Returns the platform's USDT/INR rate with a small jitter applied to
        `lastPrice` to simulate tick movement. The base `rate` is admin-controlled.
      security: []
      responses:
        "200":
          description: Market rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsdtMarketRate"

  /usdt-market/swap:
    post:
      operationId: swapUsdt
      tags: [markets]
      summary: Buy or sell USDT against INR (market or limit order)
      description: |
        **Market orders** execute immediately:
        - BUY: deducts `amount × rate` INR from `mainBalance`, credits `amount` USDT to `usdtBalance`
        - SELL: deducts `amount` USDT from `usdtBalance`, credits `amount × rate` INR to `mainBalance`

        **Limit orders** lock funds and create a pending record:
        - BUY limit: locks `amount × limitPrice` INR; credited when price hits
        - SELL limit: locks `amount` USDT; credited when price hits

        Minimum order: **1 USDT**
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsdtSwapRequest"
      responses:
        "200":
          description: Swap executed or limit order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsdtSwapResponse"
        "400":
          description: Insufficient balance or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /usdt-market/open-orders:
    get:
      operationId: getUsdtOpenOrders
      tags: [markets]
      summary: Get pending limit orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Open limit orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/UsdtLimitOrder"

  /usdt-market/open-orders/{id}:
    delete:
      operationId: cancelUsdtLimitOrder
      tags: [markets]
      summary: Cancel a pending limit order and refund locked funds
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order cancelled and funds refunded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  orderId: { type: integer }
        "404":
          description: Order not found or already cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /usdt-market/history:
    get:
      operationId: getUsdtMarketHistory
      tags: [markets]
      summary: Get completed USDT market order history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Market order history (last 50)
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/UsdtMarketHistoryItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

