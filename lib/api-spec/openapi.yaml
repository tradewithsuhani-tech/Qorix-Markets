      tags: [p2p]
      summary: Get a short-lived SSE stream token for a P2P order
      description: |
        Issues a 5-minute JWT specifically for opening the SSE stream.
        Use the returned `token` in `GET /p2p/orders/{id}/stream?token=<token>`
