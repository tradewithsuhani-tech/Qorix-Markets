  # DEPOSIT — TRON USDT on-chain pipeline
  /deposit/address:
    get:
      operationId: getDepositAddress
      tags: [deposits]
      summary: Get user's unique TRC20 USDT deposit address
      description: |
        Returns the user's persistent, unique TRC20 USDT deposit address.
        Generated on first call, reused on subsequent calls.

        **Webhook-ready pipeline:**
        The TRON monitor polls the blockchain every ~15s. On detection a
        `blockchain_deposits` row is created (`status: detected`). After the
        sweep confirms the transaction, `status` becomes `credited`, main
        balance is topped up, and a deposit notification is fired.

        The response also includes `userTronAddress` — the address the user
        sends FROM (registered via `POST /deposit/tron-address`).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Deposit address info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositAddressResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /deposit/tron-address:
    post:
      operationId: registerTronAddress
      tags: [deposits]
      summary: Register user's own TronLink wallet (the address they send FROM)
      description: |
        Stores the user's personal TRC20 address for display / tracking purposes.
        This is the source address — not the platform's receiving address.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tronAddress]
              properties:
                tronAddress:
                  type: string
                  example: "TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE"
                  description: Valid TRC20 wallet address (starts with T, 34 chars)
      responses:
        "200":
          description: Address registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  tronAddress: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

