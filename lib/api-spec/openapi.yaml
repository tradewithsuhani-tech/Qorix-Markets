  # ══════════════════════════════════════════════════════════════════════════
  # /api/v1 — Phase 1 Mobile Integration Layer
  #
  # Stable READ-ONLY versioned endpoints for native mobile (Flutter / React
  # Native) and third-party integrations.  All responses use the v1 envelope:
  #
  #   Success:   { success: true,  data: {...},   meta: { version, requestId, timestamp } }
  #   List:      { success: true,  data: [...],   pagination: { page, limit, total, totalPages }, meta }
  #   Error:     { success: false, error: { code, message }, meta }
  #
  # Auth:  POST /v1/auth/login and POST /v1/auth/refresh are origin-guard
  #        exempt (mobile clients have no browser Origin). All other write
  #        routes return 503 phase_1_writes_disabled until ledger + withdrawal
  #        hardening sprints pass QA.
  # ══════════════════════════════════════════════════════════════════════════

  /v1/auth/login:
    post:
      tags: [v1-Auth]
      operationId: v1AuthLogin
      summary: Mobile login
      description: |
        Exchange email + password for a 7-day Bearer JWT.
        No captcha required — rate-limited at 5 req/IP/min (shared with the
        main `/auth/login` bucket).

        If the account has 2FA enabled, the response returns
        `{ requires2FA: true }` — the client must complete the challenge via
        `POST /api/auth/2fa/login-verify` and use that token instead.

        Origin guard is **exempt** for this endpoint — mobile clients cannot
        set a valid `Origin` header before obtaining a token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: "MyS3cret!"
            examples:
              standard:
                summary: Normal login
                value: { email: "pravesh@example.com", password: "MyS3cret!" }
      responses:
        "200":
          description: Login successful — Bearer token + user object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1LoginResponse"
              examples:
                success:
                  summary: Successful login
                  value:
                    success: true
                    data:
                      token: "eyJhbGci..."
                      tokenType: "Bearer"
                      expiresIn: 604800
                      user:
                        id: 117
                        email: "pravesh@example.com"
                        fullName: "Pravesh Kumar"
                        kycStatus: "approved"
                        emailVerified: true
                        isAdmin: false
                        isFrozen: false
                        isDisabled: false
                        referralCode: "QXC5168F43"
                        points: 25
                        createdAt: "2026-04-22T09:28:00.203Z"
                    meta:
                      version: "v1"
                      requestId: "8ca07a202476a74f"
                      timestamp: "2026-05-26T13:13:58.992Z"
                requires2fa:
                  summary: 2FA enabled — token not issued yet
                  value:
                    success: true
                    data:
                      requires2FA: true
                      message: "Complete the 2FA flow via POST /api/auth/2fa/login-verify"
                    meta:
                      version: "v1"
                      requestId: "abc123"
                      timestamp: "2026-05-26T13:00:00.000Z"
        "400":
          description: Validation error
          content:
            application/json:
              example:
                success: false
                error: { code: "validation_error", message: "email and password are required" }
                meta: { version: "v1", requestId: "f848260705163877", timestamp: "2026-05-26T13:13:24.991Z" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              example:
                success: false
                error: { code: "invalid_credentials", message: "Email or password is incorrect" }
                meta: { version: "v1", requestId: "f3f2c8b4e8c46adc", timestamp: "2026-05-26T13:13:25.265Z" }
        "403":
          description: Account disabled, frozen, or email not verified
          content:
            application/json:
              examples:
                disabled:
                  value:
                    success: false
                    error: { code: "account_disabled", message: "This account has been disabled. Contact support." }
                    meta: { version: "v1", requestId: "...", timestamp: "..." }
                emailNotVerified:
                  value:
                    success: false
                    error: { code: "email_not_verified", message: "Please verify your email before logging in." }
                    meta: { version: "v1", requestId: "...", timestamp: "..." }
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/auth/refresh:
    post:
      tags: [v1-Auth]
      operationId: v1AuthRefresh
      summary: Rotate JWT (token refresh)
      description: |
        Exchange a valid (non-expired) Bearer JWT for a new one with a fresh
        7-day expiry. Call this on app resume or when the token has ≤ 24h
        remaining.

        **Note:** This is token *rotation*, not a true refresh-token flow.
        The client must call before expiry — an expired token will return 401
        and require re-authentication via `POST /v1/auth/login`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New token issued
          content:
            application/json:
              example:
                success: true
                data:
                  token: "eyJhbGci...newtoken"
                  tokenType: "Bearer"
                  expiresIn: 604800
                  user: { id: 117, email: "pravesh@example.com", fullName: "Pravesh Kumar" }
                meta: { version: "v1", requestId: "abc123", timestamp: "2026-05-26T13:00:00.000Z" }
        "401":
          $ref: "#/components/responses/Unauthorized"

