            console.error('::error::Update-click storage-policy smoke recorded fatal errors:');
            errors.forEach((e) => console.error('  - ' + e));
            await browser.close();
            process.exit(1);
          }

          await browser.close();
          console.log('✓ tapping Update preserves IndexedDB and localStorage (random sentinel + qorix_token) across the cache-busted reload');
