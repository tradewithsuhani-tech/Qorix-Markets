          import { chromium } from 'playwright';

          const WEB_BASE = process.env.WEB_BASE;
          const API_BASE = process.env.API_BASE;

          // Synthetic version that can never match the bundle's baked-in
          // __APP_VERSION__ — guarantees the banner appears.
          const SYNTHETIC_VERSION = `playwright-smoke-storage-${Date.now()}`;
          // Unique names so the assertions can't accidentally pass on
          // leftover state from some unrelated session.
          const LS_KEY = `qorix-smoke-ls-sentinel-${Date.now()}`;
          const LS_VALUE = `preserved-${Date.now()}`;
          const IDB_NAME = `qorix-smoke-idb-${Date.now()}`;
          const IDB_STORE = 'sentinels';
          const IDB_KEY = 'forceReload-must-not-wipe-me';
          const IDB_VALUE = `preserved-${Date.now()}`;

