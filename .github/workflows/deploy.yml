            // auth pipeline — the banner is mounted globally so it
            // renders on every route.
            console.log(`→ goto ${WEB_BASE}/login (with /version.json intercepted → ${SYNTHETIC_VERSION})`);
            await page.goto(`${WEB_BASE}/login`, {
              waitUntil: 'domcontentloaded',
              timeout: 30000,
            });
            await page
              .locator('input[placeholder="Email Address"]')
              .waitFor({ state: 'visible', timeout: 15000 });

            console.log('→ wait for [data-testid=banner-update-available]');
            await page
              .locator('[data-testid="banner-update-available"]')
              .waitFor({ state: 'visible', timeout: 30000 });

            // Seed BOTH stores with sentinel values. Without seeding,
            // a "still present after reload" assertion would trivially
            // pass on a fresh page that never had anything in those
            // stores to begin with.
            console.log(`→ seed localStorage["${LS_KEY}"]="${LS_VALUE}"`);
            await page.evaluate(
              ([key, value]) => {
                localStorage.setItem(key, value);
              },
