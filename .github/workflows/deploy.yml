      # Pins the persistence policy for forceReload() in
      # artifacts/qorix-markets/src/lib/version-check.ts. forceReload
      # today wipes Cache Storage + service workers but deliberately
      # leaves IndexedDB and localStorage alone — and it MUST stay
      # that way, because the auth token (`qorix_token`) lives in
      # localStorage (see use-auth.tsx). If a future change starts
      # blowing those stores away (e.g. someone adds
      # `localStorage.clear()` to forceReload, or wraps it with a
      # Workbox helper that wipes IDB), every user would be silently
      # logged out on every "Update" tap and any offline draft state
      # in IndexedDB would vanish. This step seeds a sentinel into
      # both stores, drives the banner-triggered reload, and asserts
      # both sentinels survive the cache-busted navigation. If the
      # team ever flips the policy to "wipe everything", flip the
      # assertions below in the same PR — that way the contract is
      # always pinned in one direction or the other and never drifts
      # silently.
      #
      # On top of the random-named sentinels (which catch a *broad*
      # `localStorage.clear()` / `indexedDB.databases().forEach(delete)`
      # regression), we also seed and assert the *known* keys the app
      # actually uses today — currently just `qorix_token`. A future
      # regression like `localStorage.removeItem("qorix_token")` inside
      # forceReload would slip past the random sentinels but is the
      # single highest-impact failure mode: it would silently log every
      # user out on every Update tap. The known-key assertion below
      # makes that regression fail loudly with a message that names the
      # key and explains the user-facing consequence. When a known
      # IndexedDB store gets adopted (e.g. a TanStack Query persistor
      # or an offline-drafts DB), add it to the same list so its
      # targeted deletion is also caught.
      - name: Browser smoke test — Update click preserves IndexedDB + localStorage
        id: smoke_web_browser_version_banner_storage
        # WEB_BASE / API_BASE inherited from workflow-level env so this
        # step exercises the same hostnames as every other web smoke step.
        run: |
          set -euo pipefail
          # Self-contained playwright install in a tmp dir so we don't
          # touch the monorepo's pnpm workspace state. Pinned to the
          # same version as the other browser smoke steps — bump
          # deliberately together.
          PW_DIR="$(mktemp -d)"
          cd "${PW_DIR}"
