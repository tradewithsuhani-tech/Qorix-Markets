name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Which app(s) to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - api
          - web

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: false

# Workflow-level env. Both bases are sourced from repo Variables (Settings →
# Secrets and variables → Actions → Variables) so we can switch what the smoke
# checks point at without editing this file.
#
# Pre-cutover defaults (Fly direct hostnames) keep the deploy honest:
# `qorixmarkets.com` and `api.qorixmarkets.com` still resolve to the OLD
# Replit deployment until the DNS cutover, so smoke-testing those would just
# be hitting an unrelated stack and giving us false confidence in Fly.
#
# Cutover flip — when DNS is moved to Fly, set these repo variables:
#   WEB_BASE = https://qorixmarkets.com
#   API_BASE = https://api.qorixmarkets.com
# No code change needed.
env:
  WEB_BASE: ${{ vars.WEB_BASE || 'https://qorix-markets-web.fly.dev' }}
  API_BASE: ${{ vars.API_BASE || 'https://qorix-api.fly.dev' }}

jobs:
  # Detect which artifact actually changed so api-only / web-only commits
  # don't redeploy the unchanged service. Shared lib/* and pnpm workspace
  # files trigger BOTH (because either app could be affected).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'artifacts/api-server/**'
              - 'lib/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'tsconfig.json'
              - '.dockerignore'
              - '.github/workflows/deploy.yml'
            web:
              - 'artifacts/qorix-markets/**'
              - 'lib/**'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'tsconfig.json'
              - '.dockerignore'
              - '.github/workflows/deploy.yml'

  # Fail fast if any required secret is missing, BEFORE we spend 3-5 minutes
  # building Docker images only to have flyctl reject auth at the very end.
  # This job runs in ~10s and prints a clear message + a clickable link to
  # the GitHub secrets page, which is the single most common reason a fresh
  # checkout's first deploy fails. See FLY_GO_LIVE_CHECKLIST.md section 7
  # for the full required-secrets table.
  preflight:
    name: Verify required secrets are configured
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true'))
    runs-on: ubuntu-latest
    steps:
      - name: Check required GitHub secrets
        env:
          # We never echo these — only test for emptiness. Listing them as env
          # vars (rather than referencing secrets.X inside the script) is the
          # GitHub-recommended pattern for secret presence checks because it
          # keeps the secret values out of the rendered run script.
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: |
          set -u
          missing=()
          [ -z "${FLY_API_TOKEN:-}" ]            && missing+=("FLY_API_TOKEN")
          [ -z "${SMOKE_TEST_EMAIL:-}" ]         && missing+=("SMOKE_TEST_EMAIL")
          [ -z "${SMOKE_TEST_PASSWORD:-}" ]      && missing+=("SMOKE_TEST_PASSWORD")
          [ -z "${VITE_RECAPTCHA_SITE_KEY:-}" ]  && missing+=("VITE_RECAPTCHA_SITE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            {
              echo "### Deploy preflight failed"
              echo ""
              echo "Missing required repository secrets:"
              for s in "${missing[@]}"; do echo "- \`$s\`"; done
              echo ""
              echo "Add them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
              echo ""
              echo "See \`FLY_GO_LIVE_CHECKLIST.md\` section 7 for the full required-secrets table."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Missing required GitHub secrets: ${missing[*]} (see job summary)"
            exit 1
          fi
          echo "All required secrets present."
          echo "Smoke targets — WEB_BASE=$WEB_BASE  API_BASE=$API_BASE"

  typecheck:
    name: Typecheck monorepo
    needs: [changes, preflight]
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && (needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Match artifacts/*/Dockerfile (PNPM_VERSION=10) so the typecheck
          # job resolves the lockfile the same way the deploy build does.
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run typecheck
        run: pnpm run typecheck

  deploy-api:
    name: Deploy api-server → qorix-api
    needs: [changes, typecheck]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'api')) ||
      (github.event_name == 'push' && needs.changes.outputs.api == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-api
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy api-server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --remote-only \
            --config artifacts/api-server/fly.toml \
            --dockerfile artifacts/api-server/Dockerfile \
            --wait-timeout 600
      # Post-deploy smoke check. `flyctl deploy` only proves the container
      # started — these curls prove the API is actually reachable, that the
      # Neon connection works, AND that the auth pipeline (login + JWT verify
      # + authMiddleware) still issues working tokens. Retries on the public
      # checks cover the brief warmup window before Fly's edge routes traffic
      # to the new machine; by the time we hit the auth checks, warmup is
      # done so we use lighter retry settings (connection-refused only) to
      # avoid hiding a real auth break behind 25s of retries.
      - name: Smoke test api-server
        id: smoke_api
        env:
          # Dedicated smoke-test account — read-only usage, password rotated
          # out-of-band. Defined as repo secrets so credentials never land in
          # the workflow file or logs.
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          # API_BASE is inherited from the workflow-level env block above
          # (defaults to https://qorix-api.fly.dev pre-cutover, override via
          # repo variable API_BASE after DNS cutover).
          echo "→ GET ${API_BASE}/api/healthz"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 10 "${API_BASE}/api/healthz" | tee /tmp/healthz.json
          grep -q '"status":"ok"' /tmp/healthz.json
          echo
          echo "→ GET ${API_BASE}/api/public/market-indicators (exercises Neon)"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 15 "${API_BASE}/api/public/market-indicators" \
            | tee /tmp/market.json
          grep -q '"activeInvestors"' /tmp/market.json
          echo
          echo "→ Authenticated smoke check (login + protected route)"
          # NOTE: SMOKE_TEST_EMAIL is flagged in the database with users.is_smoke_test=true
          # by flagSmokeTestAccount() at api-server boot. That flag blocks
          # deposits/withdrawals/transfers/trading on the account and excludes it from
          # leaderboards, referral payouts, public stats, and fraud signals — so this
          # repeated CI login can never accidentally move money or pollute counters.
          # See docs/smoke-test-account.md.
          if [ -z "${SMOKE_TEST_EMAIL:-}" ] || [ -z "${SMOKE_TEST_PASSWORD:-}" ]; then
            echo "::error::SMOKE_TEST_EMAIL / SMOKE_TEST_PASSWORD secrets are not set." \
              "Configure them in repo settings so the deploy can verify the auth pipeline."
            exit 1
          fi
          # POST /api/auth/login — fail fast on 4xx (no --retry-all-errors).
          echo "→ POST ${API_BASE}/api/auth/login"
          LOGIN_BODY=$(jq -nc \
            --arg email "${SMOKE_TEST_EMAIL}" \
            --arg password "${SMOKE_TEST_PASSWORD}" \
            '{email: $email, password: $password}')
          curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
            --max-time 15 \
            -H "Content-Type: application/json" \
            -d "${LOGIN_BODY}" \
            "${API_BASE}/api/auth/login" \
            -o /tmp/login.json
          TOKEN=$(jq -r '.token // empty' /tmp/login.json)
          if [ -z "${TOKEN}" ]; then
            echo "::error::Login returned 200 but no token in response body."
            jq 'del(.token)' /tmp/login.json || cat /tmp/login.json
            exit 1
          fi
          echo "✓ obtained smoke-test token"
          # GET /api/auth/me — exercises authMiddleware (JWT verify + user
          # lookup + maintenance / disabled / forceLogoutAfter checks). We
          # use /auth/me rather than /api/wallet because it's a strict read
          # (no lazy row creation), so re-running the smoke check on every
          # deploy can never mutate any state on the smoke-test account.
          echo "→ GET ${API_BASE}/api/auth/me (authenticated)"
          curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
            --max-time 15 \
            -H "Authorization: Bearer ${TOKEN}" \
            "${API_BASE}/api/auth/me" \
            -o /tmp/me.json
          jq -e 'has("id") and has("email")' /tmp/me.json > /dev/null \
            || { echo "::error::/api/auth/me returned 200 but body is not a user"; cat /tmp/me.json; exit 1; }
          echo "✓ authenticated route returned a valid user payload"

      # Auto-rollback: if (and only if) the smoke check above failed, promote
      # the previous release back so users aren't left on a known-bad build.
      # We don't trigger on `flyctl deploy` itself failing — in that case the
      # old release is still live and there's nothing to roll back.
      - name: Rollback qorix-api to previous release
        id: rollback_api
        if: failure() && steps.smoke_api.outcome == 'failure'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "::warning::Smoke test failed for qorix-api — rolling back to previous release."
          flyctl releases rollback \
            --app qorix-api \
            --yes
      # Smoke-test the rolled-back release so we don't silently fall back to a
      # version that's also broken. If this fails the job still ends red (the
      # original smoke step already failed), but the log will make it obvious
      # that the rollback target is bad too and a human needs to step in.
      - name: Smoke test rolled-back api-server
        if: failure() && steps.smoke_api.outcome == 'failure' && steps.rollback_api.outcome == 'success'
        env:
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          # API_BASE inherited from workflow-level env (see top of file).
          echo "→ (post-rollback) GET ${API_BASE}/api/healthz"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 10 "${API_BASE}/api/healthz" | tee /tmp/healthz-rollback.json
          grep -q '"status":"ok"' /tmp/healthz-rollback.json
          echo
          echo "→ (post-rollback) GET ${API_BASE}/api/public/market-indicators"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 15 "${API_BASE}/api/public/market-indicators" \
            | tee /tmp/market-rollback.json
          grep -q '"activeInvestors"' /tmp/market-rollback.json
          echo
          echo "→ (post-rollback) Authenticated smoke check"
          if [ -z "${SMOKE_TEST_EMAIL:-}" ] || [ -z "${SMOKE_TEST_PASSWORD:-}" ]; then
            echo "::warning::SMOKE_TEST_EMAIL / SMOKE_TEST_PASSWORD secrets are not set —" \
              "skipping post-rollback auth check."
          else
            LOGIN_BODY=$(jq -nc \
              --arg email "${SMOKE_TEST_EMAIL}" \
              --arg password "${SMOKE_TEST_PASSWORD}" \
              '{email: $email, password: $password}')
            curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
              --max-time 15 \
              -H "Content-Type: application/json" \
              -d "${LOGIN_BODY}" \
              "${API_BASE}/api/auth/login" \
              -o /tmp/login-rollback.json
            TOKEN=$(jq -r '.token // empty' /tmp/login-rollback.json)
            if [ -z "${TOKEN}" ]; then
              echo "::error::(post-rollback) login returned 200 but no token —" \
                "rollback target also has a broken auth pipeline."
              jq 'del(.token)' /tmp/login-rollback.json || cat /tmp/login-rollback.json
              exit 1
            fi
            curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
              --max-time 15 \
              -H "Authorization: Bearer ${TOKEN}" \
              "${API_BASE}/api/auth/me" \
              -o /tmp/me-rollback.json
            jq -e 'has("id") and has("email")' /tmp/me-rollback.json > /dev/null \
              || { echo "::error::(post-rollback) /api/auth/me returned 200 but body is not a user"; cat /tmp/me-rollback.json; exit 1; }
            echo "✓ (post-rollback) authenticated route healthy"
          fi

  deploy-web:
    name: Deploy qorix-markets → qorix-markets-web
    needs: [changes, typecheck]
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'web')) ||
      (github.event_name == 'push' && needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-web
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Snapshot the currently-deployed /version.json BEFORE we ship the new
      # build. The smoke step below uses this as the "previous deploy"
      # baseline so it can prove the new release actually regenerated the
      # version stamp (catches the case where the build pipeline silently
      # re-serves a stale dist/ and leaves clients stuck on the old bundle
      # with no update prompt). Treats first-ever deploys (no prior
      # /version.json) as "unknown baseline" rather than failing.
      - name: Record currently-deployed /version.json (pre-deploy baseline)
        id: prev_version
        run: |
          set -euo pipefail
          # WEB_BASE is inherited from the workflow-level env block.
          if curl -fsS --max-time 10 "${WEB_BASE}/version.json" -o /tmp/prev-version.json; then
            if PREVIOUS_VERSION=$(jq -er '.version' /tmp/prev-version.json 2>/dev/null); then
              echo "previous_version=${PREVIOUS_VERSION}" >> "$GITHUB_OUTPUT"
              echo "Recorded previous deploy version: ${PREVIOUS_VERSION}"
            else
              echo "previous_version=" >> "$GITHUB_OUTPUT"
              echo "::warning::Existing /version.json on ${WEB_BASE} is malformed —" \
                "treating as unknown baseline. Post-deploy check will still require" \
                "the new build to ship a well-formed /version.json."
            fi
          else
            echo "previous_version=" >> "$GITHUB_OUTPUT"
            echo "::warning::No /version.json reachable at ${WEB_BASE} (first deploy?)" \
              "— skipping baseline diff but still requiring new build to ship one."
          fi
      - name: Deploy qorix-markets web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Build args explicitly passed so the deployed SPA aligns with what
          # the smoke check below will assert.
          #
          # VITE_API_URL = ${API_BASE}: the Vite bundle calls the same API
          # host that the smoke step's bundle-content assertion checks for.
          # Pre-cutover defaults (qorix-api.fly.dev) keep the deploy honest;
          # post-cutover the repo variable API_BASE flips to api.qorixmarkets.com.
          # If we DIDN'T pass this, the bundle would inherit fly.toml's
          # default (api.qorixmarkets.com) and the smoke assertion would
          # fail every time before DNS cutover, triggering an unnecessary
          # rollback on every web deploy.
          #
          # VITE_RECAPTCHA_SITE_KEY: public site key (browser sends it to
          # Google) but stored as a repo secret to keep one source of truth.
          # fly.toml leaves this as "" by design so a forgotten flag fails
          # loudly in QA — without this build-arg, login captcha breaks.
          flyctl deploy \
            --remote-only \
            --config artifacts/qorix-markets/fly.toml \
            --dockerfile artifacts/qorix-markets/Dockerfile \
            --build-arg VITE_API_URL="${API_BASE}" \
            --build-arg VITE_RECAPTCHA_SITE_KEY="${{ secrets.VITE_RECAPTCHA_SITE_KEY }}" \
            --wait-timeout 600
      # Static / network-level smoke check. Confirms nginx is serving the
      # new build, the bundle has VITE_API_URL baked in, the SPA fallback
      # is healthy, and an authenticated API call from the web origin works
      # (so CORS / login / JWT verify are all happy for browser traffic).
      #
      # This step is fast diagnostic coverage — it catches the most common
      # deploy breaks (wrong/missing VITE_API_URL, broken nginx fallback,
      # CORS_ORIGIN misconfig) in a few seconds with curl, before we pay
      # the cost of spinning up a real browser. The authoritative
      # protected-page check is the next step (smoke_web_browser).
      - name: Smoke test qorix-markets web
        id: smoke_web
        env:
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          # WEB_BASE / API_BASE inherited from workflow-level env (see top of
          # file). Defaults are the Fly direct hostnames pre-cutover; flip the
          # repo variables WEB_BASE / API_BASE to qorixmarkets.com /
          # api.qorixmarkets.com after DNS is moved to Fly.
          echo "→ GET ${WEB_BASE}/healthz"
          body=$(curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 10 "${WEB_BASE}/healthz")
          echo "${body}"
          test "${body}" = "ok"
          echo

          # ── 1. Fetch the SPA shell and pull out the main JS bundle URL ──
          echo "→ GET ${WEB_BASE}/ (SPA shell)"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 15 "${WEB_BASE}/" -o /tmp/index.html
          grep -q '<div id="root">' /tmp/index.html \
            || { echo "::error::/ did not return the SPA shell (no #root div)"; head -c 2000 /tmp/index.html; exit 1; }
          BUNDLE_PATH=$(grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' /tmp/index.html | head -n1 || true)
          if [ -z "${BUNDLE_PATH}" ]; then
            echo "::error::Could not find /assets/index-*.js bundle in SPA shell — Vite build output looks wrong."
            head -c 2000 /tmp/index.html
            exit 1
          fi
          echo "✓ SPA shell served, main bundle = ${BUNDLE_PATH}"
          echo

          # ── 2. Bundle must have the prod API host baked in ──
          echo "→ GET ${WEB_BASE}${BUNDLE_PATH} (verify VITE_API_URL is baked in)"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 30 "${WEB_BASE}${BUNDLE_PATH}" -o /tmp/bundle.js
          if ! grep -qF "${API_BASE}" /tmp/bundle.js; then
            echo "::error::Main JS bundle does not contain ${API_BASE}." \
              "VITE_API_URL was not baked in at build time — the deployed SPA will" \
              "send /api/* calls same-origin and hit the SPA fallback (HTML) instead" \
              "of the API. Check artifacts/qorix-markets/fly.toml [build.args]."
            exit 1
          fi
          echo "✓ bundle has ${API_BASE} baked in"
          echo

          # ── 3. SPA fallback works for client-side routes ──
          for route in /login /dashboard; do
            echo "→ GET ${WEB_BASE}${route} (nginx SPA fallback → index.html)"
            curl -fsS --retry 3 --retry-delay 3 --retry-all-errors \
              --max-time 15 "${WEB_BASE}${route}" -o /tmp/route.html
            grep -q '<div id="root">' /tmp/route.html \
              || { echo "::error::${route} did not fall back to the SPA shell — nginx try_files broken?"; head -c 1500 /tmp/route.html; exit 1; }
          done
          echo "✓ SPA fallback healthy for /login and /dashboard"
          echo

          # ── 4. Authenticated check exercised the way the browser does it ──
          # Reuses the same dedicated smoke-test account as the api-server
          # smoke step. Setting Origin: https://qorixmarkets.com makes the
          # API run its CORS check against the real web origin, so a
          # CORS_ORIGIN misconfig that only breaks browser traffic still
          # fails the deploy here.
          if [ -z "${SMOKE_TEST_EMAIL:-}" ] || [ -z "${SMOKE_TEST_PASSWORD:-}" ]; then
            echo "::error::SMOKE_TEST_EMAIL / SMOKE_TEST_PASSWORD secrets are not set." \
              "Configure them in repo settings so the deploy can verify the auth pipeline."
            exit 1
          fi

          # CORS preflight — the browser sends this before the real POST
          # because of the JSON content-type. A 4xx here means CORS is
          # broken for the web origin even if direct curls to the API work.
          # The api-server's CORS_ORIGIN must list ${WEB_BASE} (currently
          # both qorixmarkets.com AND qorix-markets-web.fly.dev are allowed
          # in artifacts/api-server/fly.toml [env].CORS_ORIGIN).
          echo "→ OPTIONS ${API_BASE}/api/auth/login (CORS preflight from web origin)"
          PREFLIGHT_HEADERS=$(curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
            --max-time 15 -X OPTIONS \
            -H "Origin: ${WEB_BASE}" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: content-type" \
            -D - -o /dev/null \
            "${API_BASE}/api/auth/login")
          if ! echo "${PREFLIGHT_HEADERS}" | grep -iq "^access-control-allow-origin: ${WEB_BASE}"; then
            echo "::error::CORS preflight from ${WEB_BASE} did not echo back the web origin." \
              "Check CORS_ORIGIN on the api-server."
            echo "${PREFLIGHT_HEADERS}"
            exit 1
          fi
          echo "✓ CORS preflight allows ${WEB_BASE}"

          echo "→ POST ${API_BASE}/api/auth/login (with Origin: ${WEB_BASE})"
          LOGIN_BODY=$(jq -nc \
            --arg email "${SMOKE_TEST_EMAIL}" \
            --arg password "${SMOKE_TEST_PASSWORD}" \
            '{email: $email, password: $password}')
          curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
            --max-time 15 \
            -H "Content-Type: application/json" \
            -H "Origin: ${WEB_BASE}" \
            -d "${LOGIN_BODY}" \
            "${API_BASE}/api/auth/login" \
            -o /tmp/web-login.json
          TOKEN=$(jq -r '.token // empty' /tmp/web-login.json)
          if [ -z "${TOKEN}" ]; then
            echo "::error::Login from web origin returned 200 but no token in response body."
            jq 'del(.token)' /tmp/web-login.json || cat /tmp/web-login.json
            exit 1
          fi
          echo "✓ obtained smoke-test token via web origin"

          # /api/auth/me — strict read, no lazy state mutation. Same
          # rationale as the api-server smoke step: safe to re-run on
          # every deploy without dirtying the smoke account.
          echo "→ GET ${API_BASE}/api/auth/me (authenticated, with Origin: ${WEB_BASE})"
          curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
            --max-time 15 \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Origin: ${WEB_BASE}" \
            "${API_BASE}/api/auth/me" \
            -o /tmp/web-me.json
          jq -e 'has("id") and has("email")' /tmp/web-me.json > /dev/null \
            || { echo "::error::/api/auth/me from web origin returned 200 but body is not a user"; cat /tmp/web-me.json; exit 1; }
          echo "✓ authenticated route returned a valid user payload via web origin"

      # Verify the new build actually regenerated /version.json and that it
      # is internally consistent with the JS bundle being served. Without
      # this, a deploy that ships a stale dist/ (or a build that forgot to
      # re-run the version-stamp plugin) would leave the runtime update
      # checker permanently silent — every existing tab in the wild would
      # keep running the old bundle against the new API and never get the
      # "refresh" prompt. See artifacts/qorix-markets/src/lib/version-check.ts
      # and the qorix-build-version plugin in vite.config.ts.
      - name: Smoke test qorix-markets web /version.json
        id: smoke_web_version
        env:
          PREVIOUS_VERSION: ${{ steps.prev_version.outputs.previous_version }}
        run: |
          set -euo pipefail
          # WEB_BASE inherited from workflow-level env.
          echo "→ GET ${WEB_BASE}/version.json (with response headers)"
          # Capture both body and headers so we can assert on Cache-Control
          # in addition to the JSON shape. -D writes the response headers
          # to a file for later grep; -o writes the body.
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 10 \
            -D /tmp/version-headers.txt \
            -o /tmp/version-new.json \
            "${WEB_BASE}/version.json"
          cat /tmp/version-new.json
          echo

          # ── 1. Must be valid JSON with a version string ──
          if ! NEW_VERSION=$(jq -er '.version' /tmp/version-new.json 2>/dev/null); then
            echo "::error::/version.json is missing or malformed —" \
              "the build pipeline did not emit a valid version stamp." \
              "Clients will never see the update prompt and will be" \
              "stuck on whatever bundle they cached."
            cat /tmp/version-new.json
            exit 1
          fi
          if [ -z "${NEW_VERSION}" ]; then
            echo "::error::/version.json has an empty .version field."
            exit 1
          fi
          echo "✓ /version.json reports version=${NEW_VERSION}"

          # ── 2. Must NOT be cached (otherwise the update poll is useless) ──
          # nginx.conf sets `Cache-Control: no-store, no-cache, ...` on
          # /version.json. If a future config change drops that header,
          # browsers (and intermediaries) will cache the file and the
          # version checker will keep seeing the old version forever.
          if ! grep -iE '^cache-control:.*(no-store|no-cache)' /tmp/version-headers.txt > /dev/null; then
            echo "::error::/version.json is being served without no-store/no-cache —" \
              "the runtime update checker will see cached responses and never" \
              "detect new deploys."
            cat /tmp/version-headers.txt
            exit 1
          fi
          echo "✓ /version.json carries no-cache headers"

          # ── 3. Must differ from what was deployed before this run ──
          # Skipped only when there was no reachable baseline (first deploy).
          if [ -n "${PREVIOUS_VERSION:-}" ]; then
            if [ "${NEW_VERSION}" = "${PREVIOUS_VERSION}" ]; then
              echo "::error::/version.json did not change between the previous" \
                "deploy (${PREVIOUS_VERSION}) and this one (${NEW_VERSION})." \
                "Either the build did not run the version-stamp plugin, or" \
                "this deploy shipped a stale dist/. Existing browser tabs" \
                "will never see the update prompt for this release."
              exit 1
            fi
            echo "✓ /version.json changed: ${PREVIOUS_VERSION} → ${NEW_VERSION}"
          else
            echo "(no pre-deploy baseline recorded — skipping change check)"
          fi

          # ── 4. version.json must correlate with the bundle being served ──
          # Vite's `define: { __APP_VERSION__: JSON.stringify(BUILD_VERSION) }`
          # bakes the same version string into the JS bundle as a string
          # literal. If /version.json reports a version that the current
          # /assets/index-*.js doesn't contain, then /version.json was
          # regenerated by some out-of-band step and the user's bundle has
          # a stale __APP_VERSION__ — the version check would fire forever.
          echo "→ GET ${WEB_BASE}/ (re-fetch SPA shell for bundle path)"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 15 "${WEB_BASE}/" -o /tmp/index-version-check.html
          BUNDLE_PATH=$(grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' /tmp/index-version-check.html | head -n1 || true)
          if [ -z "${BUNDLE_PATH}" ]; then
            echo "::error::Could not extract /assets/index-*.js from SPA shell" \
              "during version correlation check."
            head -c 2000 /tmp/index-version-check.html
            exit 1
          fi
          echo "→ GET ${WEB_BASE}${BUNDLE_PATH} (verify ${NEW_VERSION} is baked in)"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 30 "${WEB_BASE}${BUNDLE_PATH}" -o /tmp/bundle-version-check.js
          # JSON.stringify(BUILD_VERSION) renders as "1234567890" inside the
          # bundle — match with the surrounding quotes to avoid colliding
          # with any unrelated 13-digit number that might appear in code.
          if ! grep -qF "\"${NEW_VERSION}\"" /tmp/bundle-version-check.js; then
            echo "::error::/version.json reports ${NEW_VERSION} but the deployed" \
              "JS bundle (${BUNDLE_PATH}) does not contain that version string." \
              "version.json and the bundle are out of sync — clients will" \
              "either never see an update prompt or see one that never clears."
            exit 1
          fi
          echo "✓ ${NEW_VERSION} is baked into ${BUNDLE_PATH}"

      # Authoritative web smoke check: drive a real headless Chromium
      # through the deployed login UI and verify a protected page renders.
      # The previous step proves the API is reachable from the web origin;
      # this step proves the SPA itself can boot, render the login form,
      # submit credentials, route to /dashboard, and render authenticated
      # content — i.e. the failure modes the network-only check cannot see:
      #   - JS bundle throws on first render (uncaught exception in
      #     AuthProvider, broken React provider, bad import, etc.)
      #   - Login page renders but the submit handler / token interceptor
      #     is broken so login never fires or never stores the token.
      #   - ProtectedRoute guard sends the user back to /login despite a
      #     valid session.
      #   - Authenticated page mounts but immediately crashes (blank page).
      - name: Set up Node for browser smoke test
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Browser smoke test — login + protected route
        id: smoke_web_browser
        env:
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          # WEB_BASE / API_BASE come from workflow-level env so this step
          # tests the same hostnames as the curl-based smoke step above.
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_TEST_EMAIL:-}" ] || [ -z "${SMOKE_TEST_PASSWORD:-}" ]; then
            echo "::error::SMOKE_TEST_EMAIL / SMOKE_TEST_PASSWORD secrets are not set."
            exit 1
          fi
          # Self-contained playwright install in a tmp dir so we don't
          # touch the monorepo's pnpm workspace state.
          PW_DIR="$(mktemp -d)"
          cd "${PW_DIR}"
          npm init -y >/dev/null
          # Pinned playwright version — bump deliberately, alongside any
          # change to the smoke script below.
          npm install --silent playwright@1.55.0
          npx playwright install --with-deps chromium

          cat > smoke.mjs <<'JS'
          import { chromium } from 'playwright';

          const WEB_BASE = process.env.WEB_BASE;
          const EMAIL = process.env.SMOKE_TEST_EMAIL;
          const PASSWORD = process.env.SMOKE_TEST_PASSWORD;

          const errors = [];
          const browser = await chromium.launch({ headless: true });
          const ctx = await browser.newContext({
            viewport: { width: 1280, height: 800 },
            // Consistent UA so any UA-gated logic in the SPA behaves the
            // same way it would for a real Chrome user.
            userAgent:
              'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 ' +
              '(KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
          });
          const page = await ctx.newPage();

          // Uncaught JS exceptions are always a real bug — fail on them.
          page.on('pageerror', (e) => errors.push(`pageerror: ${e.message}`));
          // Failed network requests to our own origins (web shell + api)
          // mean the bundle or backend is broken; ignore third-party noise
          // (fonts, recaptcha, analytics).
          const API_BASE = process.env.API_BASE;
          page.on('requestfailed', (req) => {
            const u = req.url();
            if (u.startsWith(WEB_BASE) || u.startsWith(API_BASE)) {
              errors.push(`requestfailed: ${u} → ${req.failure()?.errorText}`);
            }
          });
          // console.error is informational only — log it so we have it
          // in the workflow output, but don't fail the deploy on it
          // (third-party scripts / dev warnings can spam this).
          page.on('console', (msg) => {
            if (msg.type() === 'error') {
              console.log(`[browser console.error] ${msg.text()}`);
            }
          });

          const fail = async (reason) => {
            console.error(`::error::${reason}`);
            try {
              const html = await page.content();
              console.error('--- page HTML (first 2000 chars) ---');
              console.error(html.slice(0, 2000));
            } catch {}
            await browser.close();
            process.exit(1);
          };

          try {
            console.log(`→ goto ${WEB_BASE}/login`);
            await page.goto(`${WEB_BASE}/login`, {
              waitUntil: 'domcontentloaded',
              timeout: 30000,
            });

            // Login form must actually render — this proves the SPA
            // booted and the login page component mounted without
            // throwing. A blank shell would never produce these inputs.
            console.log('→ wait for login form to render');
            await page
              .locator('input[placeholder="Email Address"]')
              .waitFor({ state: 'visible', timeout: 15000 });
            await page
              .locator('input[placeholder="Password"]')
              .waitFor({ state: 'visible', timeout: 5000 });
            await page
              .getByText('Welcome back', { exact: true })
              .first()
              .waitFor({ state: 'visible', timeout: 5000 });

            console.log('→ fill credentials and submit');
            await page.fill('input[placeholder="Email Address"]', EMAIL);
            await page.fill('input[placeholder="Password"]', PASSWORD);
            await page.locator('button[type="submit"]:has-text("Sign In")').click();

            // After a successful login the SPA navigates to /dashboard.
            // If the token interceptor is broken or the guard kicks us
            // back to /login, this wait will time out.
            console.log('→ wait for redirect to /dashboard');
            await page.waitForURL(/\/dashboard(\?|#|\/|$)/, { timeout: 30000 });

            // Authenticated content must actually render — not just the
            // SPA shell. "Overview" is the dashboard's <h1>; if the page
            // mounts and immediately crashes, this assertion fails.
            console.log('→ wait for authenticated dashboard content');
            await page
              .locator('h1:has-text("Overview")')
              .first()
              .waitFor({ state: 'visible', timeout: 30000 });

            // The token must have been persisted — proves the auth
            // wiring (useAuth.login → localStorage) executed.
            const token = await page.evaluate(() =>
              window.localStorage.getItem('qorix_token'),
            );
            if (!token) {
              await fail(
                'Logged in and reached /dashboard but localStorage.qorix_token is empty — auth wiring broken.',
              );
            }
            console.log('✓ qorix_token present in localStorage');
          } catch (err) {
            await fail(`Browser smoke flow failed: ${err.message}`);
          }

          if (errors.length) {
            console.error('::error::Browser smoke test recorded fatal errors:');
            errors.forEach((e) => console.error('  - ' + e));
            await browser.close();
            process.exit(1);
          }

          await browser.close();
          console.log('✓ logged in via UI and saw authenticated /dashboard render cleanly');
          JS
          node smoke.mjs

      # Auto-rollback: if (and only if) one of the smoke checks above
      # failed, promote the previous release back so users aren't left on
      # a known-bad build. We don't trigger on `flyctl deploy` itself
      # failing — in that case the old release is still live and there's
      # nothing to roll back.
      - name: Rollback qorix-markets-web to previous release
        id: rollback_web
        if: |
          failure() && (
            steps.smoke_web.outcome == 'failure' ||
            steps.smoke_web_version.outcome == 'failure' ||
            steps.smoke_web_browser.outcome == 'failure'
          )
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "::warning::Smoke test failed for qorix-markets-web — rolling back to previous release."
          flyctl releases rollback \
            --app qorix-markets-web \
            --yes
      # Smoke-test the rolled-back release so we don't silently fall back to a
      # version that's also broken. If this fails the job still ends red (the
      # original smoke step already failed), but the log will make it obvious
      # that the rollback target is bad too and a human needs to step in.
      # Mirrors the forward smoke step: shell + bundle config + SPA fallback
      # + authenticated API call from the web origin.
      - name: Smoke test rolled-back qorix-markets web
        if: |
          failure() && steps.rollback_web.outcome == 'success' && (
            steps.smoke_web.outcome == 'failure' ||
            steps.smoke_web_version.outcome == 'failure' ||
            steps.smoke_web_browser.outcome == 'failure'
          )
        env:
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          set -euo pipefail
          # WEB_BASE / API_BASE inherited from workflow-level env (see top
          # of file). Same hostnames as the forward smoke step.
          echo "→ (post-rollback) GET ${WEB_BASE}/healthz"
          body=$(curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 10 "${WEB_BASE}/healthz")
          echo "${body}"
          test "${body}" = "ok"
          echo

          echo "→ (post-rollback) GET ${WEB_BASE}/ (SPA shell)"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 15 "${WEB_BASE}/" -o /tmp/index-rollback.html
          grep -q '<div id="root">' /tmp/index-rollback.html \
            || { echo "::error::(post-rollback) / did not return the SPA shell"; head -c 2000 /tmp/index-rollback.html; exit 1; }
          BUNDLE_PATH=$(grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' /tmp/index-rollback.html | head -n1 || true)
          if [ -z "${BUNDLE_PATH}" ]; then
            echo "::error::(post-rollback) could not find /assets/index-*.js bundle in SPA shell."
            head -c 2000 /tmp/index-rollback.html
            exit 1
          fi
          echo "✓ (post-rollback) SPA shell served, bundle = ${BUNDLE_PATH}"
          echo

          echo "→ (post-rollback) GET ${WEB_BASE}${BUNDLE_PATH} (verify VITE_API_URL is baked in)"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 30 "${WEB_BASE}${BUNDLE_PATH}" -o /tmp/bundle-rollback.js
          if ! grep -qF "${API_BASE}" /tmp/bundle-rollback.js; then
            echo "::error::(post-rollback) main JS bundle does not contain ${API_BASE} —" \
              "rollback target was also built without VITE_API_URL."
            exit 1
          fi
          echo "✓ (post-rollback) bundle has ${API_BASE} baked in"
          echo

          # Twin of the forward /version.json check. The rolled-back build
          # must still ship a well-formed, no-cache version.json that is
          # consistent with its bundle — otherwise rollback "succeeds" but
          # leaves the version checker in a broken state, and any future
          # forward deploy will trip the change-detection check on a
          # baseline it can't trust.
          echo "→ (post-rollback) GET ${WEB_BASE}/version.json"
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            --max-time 10 \
            -D /tmp/version-headers-rollback.txt \
            -o /tmp/version-rollback.json \
            "${WEB_BASE}/version.json"
          cat /tmp/version-rollback.json
          echo
          if ! ROLLED_VERSION=$(jq -er '.version' /tmp/version-rollback.json 2>/dev/null); then
            echo "::error::(post-rollback) /version.json is missing or malformed —" \
              "the rollback target also has a broken version stamp."
            cat /tmp/version-rollback.json
            exit 1
          fi
          if [ -z "${ROLLED_VERSION}" ]; then
            echo "::error::(post-rollback) /version.json has an empty .version field."
            exit 1
          fi
          if ! grep -iE '^cache-control:.*(no-store|no-cache)' /tmp/version-headers-rollback.txt > /dev/null; then
            echo "::error::(post-rollback) /version.json is missing no-store/no-cache headers" \
              "— the runtime update checker would see a cached response."
            cat /tmp/version-headers-rollback.txt
            exit 1
          fi
          if ! grep -qF "\"${ROLLED_VERSION}\"" /tmp/bundle-rollback.js; then
            echo "::error::(post-rollback) /version.json reports ${ROLLED_VERSION}" \
              "but the rolled-back bundle (${BUNDLE_PATH}) does not contain that" \
              "version string — version.json and the bundle are out of sync on" \
              "the rollback target."
            exit 1
          fi
          # Sanity warning (not fatal): a Fly rollback should restore the
          # release that was live before this deploy. If the version
          # doesn't match the pre-deploy baseline we recorded, something
          # unexpected happened (e.g. concurrent deploy from elsewhere).
          PREVIOUS_VERSION="${{ steps.prev_version.outputs.previous_version }}"
          if [ -n "${PREVIOUS_VERSION}" ] && [ "${ROLLED_VERSION}" != "${PREVIOUS_VERSION}" ]; then
            echo "::warning::(post-rollback) /version.json reports ${ROLLED_VERSION}" \
              "but the pre-deploy baseline was ${PREVIOUS_VERSION}. Fly rolled" \
              "to a release other than the one that was live before this run."
          fi
          echo "✓ (post-rollback) /version.json is well-formed, no-cache, and matches bundle"
          echo

          for route in /login /dashboard; do
            echo "→ (post-rollback) GET ${WEB_BASE}${route} (SPA fallback)"
            curl -fsS --retry 3 --retry-delay 3 --retry-all-errors \
              --max-time 15 "${WEB_BASE}${route}" -o /tmp/route-rollback.html
            grep -q '<div id="root">' /tmp/route-rollback.html \
              || { echo "::error::(post-rollback) ${route} did not fall back to the SPA shell"; head -c 1500 /tmp/route-rollback.html; exit 1; }
          done
          echo "✓ (post-rollback) SPA fallback healthy for /login and /dashboard"
          echo

          echo "→ (post-rollback) Authenticated smoke check from web origin"
          if [ -z "${SMOKE_TEST_EMAIL:-}" ] || [ -z "${SMOKE_TEST_PASSWORD:-}" ]; then
            echo "::warning::SMOKE_TEST_EMAIL / SMOKE_TEST_PASSWORD secrets are not set —" \
              "skipping post-rollback auth check."
          else
            PREFLIGHT_HEADERS=$(curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
              --max-time 15 -X OPTIONS \
              -H "Origin: ${WEB_BASE}" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: content-type" \
              -D - -o /dev/null \
              "${API_BASE}/api/auth/login")
            if ! echo "${PREFLIGHT_HEADERS}" | grep -iq "^access-control-allow-origin: ${WEB_BASE}"; then
              echo "::error::(post-rollback) CORS preflight from ${WEB_BASE} did not echo back the web origin."
              echo "${PREFLIGHT_HEADERS}"
              exit 1
            fi

            LOGIN_BODY=$(jq -nc \
              --arg email "${SMOKE_TEST_EMAIL}" \
              --arg password "${SMOKE_TEST_PASSWORD}" \
              '{email: $email, password: $password}')
            curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
              --max-time 15 \
              -H "Content-Type: application/json" \
              -H "Origin: ${WEB_BASE}" \
              -d "${LOGIN_BODY}" \
              "${API_BASE}/api/auth/login" \
              -o /tmp/web-login-rollback.json
            TOKEN=$(jq -r '.token // empty' /tmp/web-login-rollback.json)
            if [ -z "${TOKEN}" ]; then
              echo "::error::(post-rollback) login from web origin returned 200 but no token."
              jq 'del(.token)' /tmp/web-login-rollback.json || cat /tmp/web-login-rollback.json
              exit 1
            fi
            curl -fsS --retry 3 --retry-delay 3 --retry-connrefused \
              --max-time 15 \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Origin: ${WEB_BASE}" \
              "${API_BASE}/api/auth/me" \
              -o /tmp/web-me-rollback.json
            jq -e 'has("id") and has("email")' /tmp/web-me-rollback.json > /dev/null \
              || { echo "::error::(post-rollback) /api/auth/me returned 200 but body is not a user"; cat /tmp/web-me-rollback.json; exit 1; }
            echo "✓ (post-rollback) authenticated route healthy via web origin"
          fi

      # Same headless-browser smoke as the forward path, but against the
      # rolled-back release. Catches the case where the rollback target
      # has its own latent SPA bug (e.g. broken AuthProvider) — without
      # this, a "rollback succeeded" log would mislead operators into
      # thinking users are back on a working build.
      - name: Set up Node for post-rollback browser smoke test
        if: |
          failure() && steps.rollback_web.outcome == 'success' && (
            steps.smoke_web.outcome == 'failure' ||
            steps.smoke_web_version.outcome == 'failure' ||
            steps.smoke_web_browser.outcome == 'failure'
          )
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Browser smoke test rolled-back qorix-markets web
        if: |
          failure() && steps.rollback_web.outcome == 'success' && (
            steps.smoke_web.outcome == 'failure' ||
            steps.smoke_web_version.outcome == 'failure' ||
            steps.smoke_web_browser.outcome == 'failure'
          )
        env:
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          # WEB_BASE / API_BASE come from workflow-level env.
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_TEST_EMAIL:-}" ] || [ -z "${SMOKE_TEST_PASSWORD:-}" ]; then
            echo "::warning::SMOKE_TEST_EMAIL / SMOKE_TEST_PASSWORD secrets are not set —" \
              "skipping post-rollback browser smoke check."
            exit 0
          fi
          PW_DIR="$(mktemp -d)"
          cd "${PW_DIR}"
          npm init -y >/dev/null
          npm install --silent playwright@1.55.0
          npx playwright install --with-deps chromium

          cat > smoke.mjs <<'JS'
          import { chromium } from 'playwright';

          const WEB_BASE = process.env.WEB_BASE;
          const EMAIL = process.env.SMOKE_TEST_EMAIL;
          const PASSWORD = process.env.SMOKE_TEST_PASSWORD;

          const errors = [];
          const browser = await chromium.launch({ headless: true });
          const ctx = await browser.newContext({
            viewport: { width: 1280, height: 800 },
            userAgent:
              'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 ' +
              '(KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
          });
          const page = await ctx.newPage();

          page.on('pageerror', (e) => errors.push(`pageerror: ${e.message}`));
          const API_BASE = process.env.API_BASE;
          page.on('requestfailed', (req) => {
            const u = req.url();
            if (u.startsWith(WEB_BASE) || u.startsWith(API_BASE)) {
              errors.push(`requestfailed: ${u} → ${req.failure()?.errorText}`);
            }
          });
          page.on('console', (msg) => {
            if (msg.type() === 'error') {
              console.log(`[browser console.error] ${msg.text()}`);
            }
          });

          const fail = async (reason) => {
            console.error(`::error::(post-rollback) ${reason}`);
            try {
              const html = await page.content();
              console.error('--- page HTML (first 2000 chars) ---');
              console.error(html.slice(0, 2000));
            } catch {}
            await browser.close();
            process.exit(1);
          };

          try {
            console.log(`→ (post-rollback) goto ${WEB_BASE}/login`);
            await page.goto(`${WEB_BASE}/login`, {
              waitUntil: 'domcontentloaded',
              timeout: 30000,
            });

            await page
              .locator('input[placeholder="Email Address"]')
              .waitFor({ state: 'visible', timeout: 15000 });
            await page
              .locator('input[placeholder="Password"]')
              .waitFor({ state: 'visible', timeout: 5000 });
            await page
              .getByText('Welcome back', { exact: true })
              .first()
              .waitFor({ state: 'visible', timeout: 5000 });

            await page.fill('input[placeholder="Email Address"]', EMAIL);
            await page.fill('input[placeholder="Password"]', PASSWORD);
            await page.locator('button[type="submit"]:has-text("Sign In")').click();

            await page.waitForURL(/\/dashboard(\?|#|\/|$)/, { timeout: 30000 });
            await page
              .locator('h1:has-text("Overview")')
              .first()
              .waitFor({ state: 'visible', timeout: 30000 });

            const token = await page.evaluate(() =>
              window.localStorage.getItem('qorix_token'),
            );
            if (!token) {
              await fail(
                'Logged in and reached /dashboard but localStorage.qorix_token is empty on rolled-back build.',
              );
            }
          } catch (err) {
            await fail(`Browser smoke flow failed on rolled-back build: ${err.message}`);
          }

          if (errors.length) {
            console.error('::error::(post-rollback) browser smoke recorded fatal errors —' +
              ' rollback target also has a broken SPA.');
            errors.forEach((e) => console.error('  - ' + e));
            await browser.close();
            process.exit(1);
          }

          await browser.close();
          console.log('✓ (post-rollback) login UI + authenticated /dashboard render cleanly');
