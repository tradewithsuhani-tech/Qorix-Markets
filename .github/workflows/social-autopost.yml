name: Social Auto Post

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC
    - cron: "30 3 * * *"
    # 7:00 PM IST = 13:30 UTC
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      banner_id:
        description: "Force banner id (e.g. b01)"
        required: false
        default: ""
      only_platforms:
        description: "Comma list (telegram,bluesky,x,linkedin,facebook,instagram,hashnode)"
        required: false
        default: ""

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run auto poster
        env:
          FORCE_BANNER_ID: ${{ github.event.inputs.banner_id }}
          ONLY_PLATFORMS: ${{ github.event.inputs.only_platforms }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
        run: python3 scripts/social/auto_post.py
