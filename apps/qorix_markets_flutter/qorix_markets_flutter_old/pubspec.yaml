name: qorix_markets_flutter
description: QorixMarkets — premium fintech trading platform for Android & iOS.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.6.2
  flutter_animate: ^4.5.2
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  equatable: ^2.0.7
  intl: ^0.19.0
  fl_chart: ^0.69.2
  web_socket_channel: ^3.0.1
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.1
  local_auth: ^2.3.0
  crypto: ^3.0.6
  google_sign_in: ^6.2.2
  flutter_web_auth_2: ^4.1.0
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/auth/
    - assets/icons/
