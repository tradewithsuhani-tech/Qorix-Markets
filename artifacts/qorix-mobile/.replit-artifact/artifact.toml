kind = "mobile"
previewPath = "/mobile/"
title = "Qorix Mobile"
version = "1.0.0"
id = "artifacts/qorix-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18311

[services.development]
run = "pnpm --filter @workspace/qorix-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qorix-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/qorix-mobile", "run", "serve" ]

[services.env]
PORT = "18311"
BASE_PATH = "/mobile/"
