# fly.toml app configuration file generated for qorix-api on 2026-04-26T08:25:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'qorix-api'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGIN = 'https://qorixmarkets.com,https://www.qorixmarkets.com,https://qorix-markets-web.fly.dev'
  NODE_ENV = 'production'
  PORT = '8080'
  RUN_BACKGROUND_JOBS = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'get'
    path = '/api/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['app']
