# fly.toml app configuration file generated for qorix-api on 2026-04-26T08:25:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'qorix-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGIN = 'https://qorixmarkets.com,https://www.qorixmarkets.com,https://qorix-markets-web.fly.dev'
  NODE_ENV = 'production'
  PORT = '8080'
  ADMIN_TELEGRAM_CHAT = '@Qmaxadmin'
  ADMIN_ALERT_EMAIL = 'looxprem@gmail.com'
  # RUN_BACKGROUND_JOBS is intentionally NOT set here. src/index.ts derives
  # it from FLY_PROCESS_GROUP (auto-set by Fly per process group below):
  #   app    → false  (web HTTP traffic only)
  #   worker → true   (cron + Tron monitor + Telegram poller + BullMQ workers)
  # Setting it here would override the per-process logic and re-create the
  # 2026-04-28 pool-exhaustion incident.

# ─── Process groups: web vs worker split ───────────────────────────────────
# Splits the running container into two roles backed by the same image:
#   app    → fronted by [http_service] below, serves /api/* HTTP requests.
#   worker → no public traffic; runs cron, on-chain watchers, Telegram poller,
#            BullMQ workers (gated by RUN_BACKGROUND_JOBS, set per-process in
#            src/index.ts via FLY_PROCESS_GROUP).
# Each process group gets its own Fly machines and its own pg.Pool — so a
# slow cron tick can no longer queue requests behind it, and a burst of
# web traffic can no longer delay a cron tick.
[processes]
  app = 'node --enable-source-maps dist/index.mjs'
  worker = 'node --enable-source-maps dist/index.mjs'

# Phase 5 (2026-04-28): bumped from 1 → 2 to keep at least two web machines
# always warm (one BOM + one SIN once `flyctl scale count app=3 --region bom=2
# --region sin=1` lands the third). Combined with auto_stop_machines='off',
# all provisioned machines stay running so cache + rate-limit state in Redis
# is shared from t=0 with no cold-start penalty under 5000-concurrent load.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'get'
    path = '/api/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['app']

# Worker VM — same shape as the web VM. Sized identically because cron /
# tron-monitor / Telegram poller workloads are I/O-bound (DB + RPC) and
# fit comfortably in 1 GB. Bump to shared-cpu-2x / 2 GB only if we observe
# CPU saturation or OOM after the split.
[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['worker']

# ─── Restart policy (Task #135) ───────────────────────────────────────────
# Make the restart-on-crash semantics explicit in fly.toml rather than
# relying on Fly's default per-process behaviour. `policy = 'always'` means
# Fly will restart the machine even after a clean exit (exit code 0) — we
# want this for the worker because background-jobs.ts wires `process.exit(0)`
# into graceful shutdown, and a SIGTERM-driven exit on a single deploy
# rollback should NOT permanently take the worker offline.
#
# `max_restarts` is a soft cap that resets after the machine has stayed
# up for 30s. With the heartbeat self-check below, a wedged worker that
# Fly restarts will write a fresh heartbeat within ~60s of coming back —
# pushing the counter back to 0 and avoiding the "auto-stopped after 5
# crashes" cliff that triggered the 2026-05-01 incident.
[[restart]]
  policy = 'always'
  max_restarts = 10
  processes = ['worker']

# ─── Worker heartbeat health check (Task #135) ────────────────────────────
# Fly probes /api/worker-healthz on the worker VM's internal port (8080)
# every 30s. The endpoint reads an in-process timestamp updated by the
# every-minute heartbeat loop in lib/worker-heartbeat-service.ts and
# returns 503 once the loop has stalled. Fly then restarts the failing
# machine, and the [[restart]] block above re-runs the boot sequence.
#
# `grace_period = '2m'` covers the boot window before the first heartbeat
# write completes (the in-process check has its own boot grace, but the
# Fly probe needs to wait too — otherwise a slow-booting worker with a
# 30s DB-pool warmup would 503 once and Fly would yank it).
#
# This health check ALSO enables the secondary detection layer: the web
# process group runs a watchdog that polls the heartbeat row and pages
# admin via the existing voice-call cascade (same channel as INR
# escalation) if no beat lands in 5+ minutes. Fly's auto-restart catches
# transient wedging; the admin page catches the rare case where Fly itself
# fails to restart the machine.
[[checks]]
  name = 'worker_heartbeat'
  type = 'http'
  port = 8080
  interval = '30s'
  timeout = '5s'
  grace_period = '2m'
  method = 'get'
  path = '/api/worker-healthz'
  protocol = 'http'
  processes = ['worker']

# ─── Worker count (Task #135) ─────────────────────────────────────────────
# Fly does not currently let us declare `min_machines_running` for non-HTTP
# process groups in fly.toml — the property is part of the [http_service]
# block which only applies to web traffic. The worker count is therefore
# set once via `flyctl scale count worker=1 --region bom` and persists in
# Fly's machine state across deploys. The [[restart]] policy above ensures
# a crashed worker comes back, and the [[checks]] block ensures a wedged
# one is recycled — between the two, the only failure mode left where the
# count can drift to zero is an explicit `flyctl scale count worker=0`,
# which is now mirrored by an alert via the web watchdog within 5 min.
#
# Cutover note for ops: after applying this fly.toml, run
#   flyctl checks list -a qorix-api
# and confirm a `worker_heartbeat` check appears for each worker machine.
