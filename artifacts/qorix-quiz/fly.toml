# Fly.io app config for the Qorix Play web app (qorix-quiz artifact).
#
# Deployed via GitHub Actions (.github/workflows/deploy.yml → deploy-quiz job)
# on push to `main` when artifacts/qorix-quiz/** or shared paths change.
# Build context is the repo root; VITE_API_URL is baked into the static
# bundle at Docker build time.

app            = "qorix-quiz"
# Mumbai (bom) — match qorix-markets-web and qorix-api so the first byte of
# the SPA + the first /api/* call (when SSO + quiz-play land in B36+) both
# come from India. See artifacts/api-server/fly.toml for the rationale.
primary_region = "bom"

# ─── Build ──────────────────────────────────────────────────────────────────
[build]
  dockerfile = "Dockerfile"

  # Build-time args baked into the Vite bundle.
  #
  # VITE_API_URL: plumbed but unused by the current landing page. SSO + quiz-
  # play screens (B36+) will call qorix-api via this URL. The deploy job
  # passes ${API_BASE} explicitly so pre-DNS-cutover the bundle calls
  # qorix-api.fly.dev and post-cutover it calls api.qorixmarkets.com — no
  # code change needed.
  #
  # BASE_PATH = "/" because qorixplay.com is the apex root. In Replit dev
  # the workflow uses /qorix-quiz/ so the multi-artifact preview can route
  # to it without colliding with qorix-markets at /.
  [build.args]
    VITE_API_URL = "https://api.qorixmarkets.com"
    BASE_PATH    = "/"

# ─── Runtime env ────────────────────────────────────────────────────────────
[env]
  NODE_ENV = "production"
  PORT     = "8080"

# ─── HTTP service ───────────────────────────────────────────────────────────
[http_service]
  internal_port        = 8080
  force_https          = true
  # Stateless static-file server — fine to scale to zero between requests.
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "get"
    path         = "/healthz"
    protocol     = "http"

# ─── Machine sizing ─────────────────────────────────────────────────────────
[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  processes = ["app"]
