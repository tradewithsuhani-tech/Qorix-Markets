kind = "video"
previewPath = "/qorix-tutorial/"
title = "Qorix Markets — Platform Tutorial"
version = "1.0.0"
id = "artifacts/qorix-tutorial"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/qorix-tutorial/" ]
localPort = 25144

[services.development]
run = "pnpm --filter @workspace/qorix-tutorial run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qorix-tutorial", "run", "build" ]
publicDir = "artifacts/qorix-tutorial/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25144"
BASE_PATH = "/qorix-tutorial/"
