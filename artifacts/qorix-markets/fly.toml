# Fly.io app config for the Qorix Markets web app.
#
# Deployed via GitHub Actions on push to `main`. Build context is the repo
# root; VITE_API_URL is baked into the static bundle at Docker build time.

app            = "qorix-markets-web"
# Mumbai (bom) — keep the static-file server in the same region as the api
# so the first byte of the SPA + the first /api/* call both come from
# India. See artifacts/api-server/fly.toml for the rationale.
primary_region = "bom"

# ─── Build ──────────────────────────────────────────────────────────────────
[build]
  dockerfile = "Dockerfile"

  # Build-time args baked into the Vite bundle. To change the api host,
  # update this value (or override via `flyctl deploy --build-arg`).
  #
  # VITE_RECAPTCHA_SITE_KEY is a PUBLIC key (browser sends it to Google) but
  # is sourced from a Replit secret to keep one source of truth. Every deploy
  # MUST pass it via `--build-arg VITE_RECAPTCHA_SITE_KEY=$VITE_RECAPTCHA_SITE_KEY`
  # — otherwise login captcha breaks. Empty default here is intentional so a
  # forgotten flag fails loudly in QA instead of silently shipping no key.
  #
  # B9.6: Cloudflare Turnstile lives alongside reCAPTCHA, switched on by the
  # build-time `VITE_CAPTCHA_PROVIDER` arg (default "recaptcha"). When the
  # B9.6 cutover lands the deploy will pass:
  #   --build-arg VITE_CAPTCHA_PROVIDER=turnstile
  #   --build-arg VITE_TURNSTILE_SITE_KEY=$VITE_TURNSTILE_SITE_KEY
  # The api-server side flips with the matching `CAPTCHA_PROVIDER=turnstile`
  # Fly secret. Until then the new args ship empty / default and the bundle's
  # behavior is identical to pre-B9.6.
  [build.args]
    VITE_API_URL            = "https://api.qorixmarkets.com"
    BASE_PATH               = "/"
    VITE_RECAPTCHA_SITE_KEY = ""
    VITE_TURNSTILE_SITE_KEY = ""
    VITE_CAPTCHA_PROVIDER   = "turnstile"

# ─── Runtime env ────────────────────────────────────────────────────────────
[env]
  NODE_ENV = "production"
  PORT     = "8080"

# ─── HTTP service ───────────────────────────────────────────────────────────
[http_service]
  internal_port       = 8080
  force_https         = true
  # Stateless static-file server — fine to scale to zero between requests.
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0
  processes            = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "get"
    path         = "/healthz"
    protocol     = "http"

# ─── Machine sizing ─────────────────────────────────────────────────────────
[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  processes = ["app"]
