server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip / brotli-friendly defaults — Fly's edge handles compression too,
  # but enabling here helps when traffic bypasses the edge.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Long-cache fingerprinted asset bundles (Vite emits hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # NEVER cache the entry html or version.json — those are how the client
  # detects new deploys and prompts the user to refresh.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    expires off;
  }
  location = /version.json {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    expires off;
    try_files $uri =404;
  }

  # Service worker (if any future re-introduction): never cache.
  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    expires off;
    try_files $uri =404;
  }

  # SPA fallback — wouter handles all client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Lightweight readiness probe used by Fly's healthcheck.
  location = /healthz {
    access_log off;
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
