<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="qg" x1="20" y1="15" x2="85" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="35%" stop-color="#3b82f6"/>
      <stop offset="75%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="qg2" x1="55" y1="55" x2="80" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="qshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1.5" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#qshadow)">
    <!-- Q ring (open at bottom-right where tail joins) -->
    <path
      d="M 50 14
         a 32 32 0 1 1 -22.6 9.4
         M 64 70
         L 84 92
         L 58 84 Z"
      stroke="url(#qg)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="url(#qg2)" fill-rule="evenodd"/>
  </g>
</svg>
