<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- Cache busting: never cache index.html so users always get the latest
         JS/CSS bundle hashes after a deploy. The bundles themselves are
         content-hashed by Vite and immutable, so only the entry document
         needs to be no-cached. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#0a0f1c" />
    <meta name="application-name" content="Qorix Markets" />
    <meta name="description" content="Professional automated USDT trading platform." />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon: consolidated to 2 declarations (was 8). The previous setup
         had 5 <link rel="icon"> + 3 <link rel="apple-touch-icon"> tags,
         each pointing at the same image with a `?v=4` cache-buster, which
         caused 15-20 redundant fetches per page-load on Chromium dev tools
         (HMR re-emits + sized-variant matching re-fires the link list).
         Modern browsers pick the best icon from `<link rel="icon">` and
         iOS uses `<link rel="apple-touch-icon">` — that's all we need. -->
    <link rel="icon" type="image/png" href="/qorix-favicon.png?v=4" />

    <!-- iOS / Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Qorix" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />

    <!-- iOS splash screens (portrait) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#0a0f1c" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qorixmarkets.com/" />
    <meta property="og:title" content="Qorix Markets — Automated Trading. Smarter Investing." />
    <meta property="og:description" content="System Driven. Hands Free. Built for Growth. Automated USDT trading strategies with built-in risk management." />
    <meta property="og:image" content="https://qorixmarkets.com/og-share-1200.png?v=1" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Qorix Markets — Automated Trading, Smarter Investing" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Qorix Markets — Automated Trading. Smarter Investing." />
    <meta name="twitter:description" content="System Driven. Hands Free. Built for Growth." />
    <meta name="twitter:image" content="https://qorixmarkets.com/og-share-1200.png?v=1" />

    <title>Qorix Markets | Premium Trading Terminal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
